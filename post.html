  <style>
    .post-page { max-width:760px; margin:0 auto; padding:40px 20px 80px; }

    .post-back {
      display:inline-flex; align-items:center; gap:6px;
      font-size:.82rem; color:var(--accent); text-decoration:none;
      margin-bottom:32px; transition:opacity var(--transition);
    }
    .post-back:hover { opacity:.7; }

    .post-meta {
      display:flex; align-items:center; gap:12px; flex-wrap:wrap;
      margin-bottom:20px;
    }
    .post-type-badge {
      font-size:.75rem; font-weight:700; letter-spacing:.06em;
      padding:4px 12px; border-radius:999px;
    }
    .post-type-badge.note  { background:rgba(0,212,255,0.12); color:var(--accent); }
    .post-type-badge.video { background:rgba(231,76,60,0.12); color:#e74c3c; }
    .post-type-badge.quote { background:rgba(155,89,182,0.12); color:#9b59b6; }
    .post-type-badge.link  { background:rgba(39,174,96,0.12); color:#27ae60; }
    .post-date-full { font-size:.8rem; color:var(--muted); }
    .post-pin-badge {
      font-size:.75rem; background:rgba(0,212,255,0.1); color:var(--accent);
      padding:4px 10px; border-radius:999px; font-weight:600;
    }

    .post-full-title {
      font-size:clamp(1.4rem, 4vw, 2rem); font-weight:800;
      line-height:1.25; margin-bottom:24px; color:var(--text);
    }

    /* Video embed */
    .post-video-embed {
      width:100%; aspect-ratio:16/9; border-radius:12px; overflow:hidden;
      margin-bottom:28px; background:#050810;
    }
    .post-video-embed iframe, .post-video-embed video {
      width:100%; height:100%; border:none; display:block;
    }

    /* Quote */
    .post-full-quote {
      font-size:1.2rem; font-style:italic; line-height:1.7;
      color:var(--text); border-left:4px solid var(--accent);
      padding:16px 0 16px 24px; margin-bottom:12px;
    }
    .post-full-author { font-size:.9rem; color:var(--muted); margin-bottom:28px; }

    /* Link */
    .post-full-link {
      display:inline-flex; align-items:center; gap:6px;
      font-size:.9rem; color:var(--accent); text-decoration:none;
      padding:10px 18px; border:1px solid rgba(0,212,255,0.2);
      border-radius:10px; margin-bottom:24px; word-break:break-all;
      transition:all var(--transition);
    }
    .post-full-link:hover { background:rgba(0,212,255,0.06); border-color:var(--accent); }

    /* Content body */
    .post-full-content {
      font-size:1rem; color:var(--muted); line-height:1.8;
      word-break:break-word;
    }
    .post-full-content h1,.post-full-content h2,.post-full-content h3,.post-full-content h4 {
      color:var(--text); margin:20px 0 10px; line-height:1.3;
    }
    .post-full-content h1 { font-size:1.4rem; }
    .post-full-content h2 { font-size:1.2rem; }
    .post-full-content h3 { font-size:1.1rem; }
    .post-full-content p   { margin:0 0 14px; }
    .post-full-content p:last-child { margin-bottom:0; }
    .post-full-content ul,.post-full-content ol { padding-left:24px; margin:10px 0; }
    .post-full-content li  { margin-bottom:5px; }
    .post-full-content a   { color:var(--accent); text-decoration:underline; text-underline-offset:2px; }
    .post-full-content a:hover { opacity:.8; }
    .post-full-content strong { color:var(--text); }
    .post-full-content code {
      background:rgba(0,212,255,.08); color:var(--accent);
      padding:2px 6px; border-radius:4px; font-size:.9em;
    }
    .post-full-content pre {
      background:rgba(0,0,0,.35); border:1px solid rgba(255,255,255,.07);
      border-radius:10px; padding:16px 18px; overflow-x:auto;
      margin:12px 0; font-size:.88rem; line-height:1.5;
    }
    .post-full-content pre code { background:transparent; padding:0; color:var(--text); }
    .post-full-content blockquote {
      border-left:3px solid var(--accent); padding-left:16px;
      color:var(--text); font-style:italic; margin:12px 0;
    }
    .post-full-content img { max-width:100%; border-radius:8px; margin:10px 0; }
    .post-full-content hr  { border:none; border-top:1px solid rgba(255,255,255,.08); margin:20px 0; }

    /* Tags */
    .post-full-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:28px; }
    .post-full-tag {
      font-size:.78rem; background:rgba(0,212,255,0.08); color:var(--accent);
      border-radius:999px; padding:4px 12px;
    }

    /* Share bar */
    .post-share-bar {
      display:flex; align-items:center; gap:12px; margin-top:32px;
      padding-top:20px; border-top:1px solid rgba(255,255,255,0.06);
    }
    .post-share-btn {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
      color:var(--text); border-radius:8px; padding:8px 16px;
      font-size:.82rem; cursor:pointer; font-family:inherit;
      transition:all var(--transition);
    }
    .post-share-btn:hover { border-color:var(--accent); color:var(--accent); }
    .post-share-btn.copied { border-color:#27ae60; color:#27ae60; }

    /* Not found */
    .post-not-found { text-align:center; padding:80px 20px; color:var(--muted); }
    .post-not-found h2 { color:var(--text); opacity:.6; margin-bottom:12px; }
  </style>
</head>

  <script>
  (function(){
    var idle=window.requestIdleCallback||function(cb){setTimeout(cb,200)};
    idle(function(){
      var s1=document.createElement('script');s1.src='https://unpkg.com/lucide@0.469.0';document.body.appendChild(s1);
      var s2=document.createElement('script');s2.src='effects.js';document.body.appendChild(s2);
    });
  })();
  </script>
  <script>
  (function(){
    async function safeGet(c,d){ if(typeof window.fsGet==='function'){try{return await window.fsGet(c,d);}catch(e){return null;}} return null; }

    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function renderMd(text){
      if(!text) return '';
      if(typeof marked!=='undefined' && typeof DOMPurify!=='undefined'){
        try{ return DOMPurify.sanitize(marked.parse(text)); }catch(e){}
      }
      return esc(text);
    }
    function fmtDate(ts){
      const d = new Date(ts);
      const fmt = window._acDateFmt || 'long';
      if (fmt === 'short') return d.toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric'});
      if (fmt === 'medium') return d.toLocaleDateString('ru-RU', {day:'numeric', month:'short', year:'numeric'});
      if (fmt === 'relative') {
        const diff = Math.floor((Date.now() - d.getTime()) / 86400000);
        if (diff === 0) return 'Сегодня';
        if (diff === 1) return 'Вчера';
        if (diff < 7) return diff + ' дн. назад';
        if (diff < 30) return Math.floor(diff/7) + ' нед. назад';
        return d.toLocaleDateString('ru-RU', {day:'numeric', month:'short', year:'numeric'});
      }
      return d.toLocaleDateString('ru-RU', {day:'numeric', month:'long', year:'numeric'});
    }
    function typeLabel(t){
      return {note:'📝 Заметка',video:'🎬 Видео',quote:'💬 Цитата',link:'🔗 Ссылка'}[t]||'📝 Заметка';
    }

    const params = new URLSearchParams(location.search);
    const boardId = params.get('board')||'';
    const postId = Number(params.get('post'))||0;

    async function loadPost(){
      const page = document.getElementById('post-page');
      if(!boardId || !postId){
        page.innerHTML = notFound();
        return;
      }
      let posts = [];
      try{
        const doc = await safeGet('boards', boardId);
        posts = (doc && doc.posts)||[];
      }catch(e){ posts=[]; }

      const post = posts.find(p => p.id === postId);
      if(!post){
        page.innerHTML = notFound();
        return;
      }

      document.title = (post.title || post.content?.slice(0,50) || 'Запись') + ' · Andrii Chepelovskyi';
      page.innerHTML = renderFullPost(post);
    }

    function notFound(){
      return `<div class="post-not-found">
        <h2>Запись не найдена</h2>
        <p>Возможно, она была удалена или ссылка неверная.</p>
        <a href="interest.html?id=${esc(boardId)}" class="post-back" style="margin-top:20px">← Назад к доске</a>
      </div>`;
    }

    function renderFullPost(p){
      let html = '';

      // Back link
      html += `<a href="interest.html?id=${esc(boardId)}" class="post-back">← Назад к доске</a>`;

      // Meta: type badge + date + pin
      html += `<div class="post-meta">`;
      html += `<span class="post-type-badge ${p.type}">${typeLabel(p.type)}</span>`;
      html += `<span class="post-date-full">${fmtDate(p.id)}</span>`;
      if(p.pinned) html += `<span class="post-pin-badge">📌 Закреплено</span>`;
      html += `</div>`;

      // Title
      if(p.title && p.type !== 'quote'){
        html += `<h1 class="post-full-title">${esc(p.title)}</h1>`;
      }

      // Video embed
      if(p.type === 'video'){
        if(p.videoType === 'youtube' && p.videoId){
          html += `<div class="post-video-embed"><iframe src="https://www.youtube.com/embed/${esc(p.videoId)}?rel=0" allowfullscreen allow="autoplay"></iframe></div>`;
        } else if(p.videoType === 'vimeo' && p.videoId){
          html += `<div class="post-video-embed"><iframe src="https://player.vimeo.com/video/${esc(p.videoId)}?color=00d4ff" allowfullscreen></iframe></div>`;
        } else if(p.videoId){
          html += `<div class="post-video-embed"><video controls src="${esc(p.videoId)}"></video></div>`;
        }
      }

      // Quote
      if(p.type === 'quote'){
        html += `<div class="post-full-quote">${esc(p.content||'')}</div>`;
        if(p.author) html += `<div class="post-full-author">— ${esc(p.author)}</div>`;
      }

      // Link
      if(p.type === 'link' && p.url){
        html += `<a class="post-full-link" href="${esc(p.url)}" target="_blank" rel="noopener">🔗 ${esc(p.url)}</a>`;
      }

      // Content (for non-quote types, or additional text for quotes)
      if(p.content && p.type !== 'quote'){
        html += `<div class="post-full-content">${renderMd(p.content)}</div>`;
      }

      // Tags
      if((p.tags||[]).length){
        html += `<div class="post-full-tags">${p.tags.map(t => `<span class="post-full-tag">#${esc(t)}</span>`).join('')}</div>`;
      }

      // Share bar
      html += `<div class="post-share-bar">
        <button class="post-share-btn" onclick="copyLink(this)">📋 Скопировать ссылку</button>
      </div>`;

      return html;
    }

    window.copyLink = function(btn){
      const url = location.href;
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(url).then(()=>showCopied(btn)).catch(()=>fbCopy(url,btn));
      } else { fbCopy(url,btn); }
    };
    function fbCopy(text,btn){
      const ta=document.createElement('textarea');
      ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.select();
      try{document.execCommand('copy');showCopied(btn);}catch(e){}
      document.body.removeChild(ta);
    }
    function showCopied(btn){
      btn.classList.add('copied');btn.innerHTML='✓ Скопировано';
      setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='📋 Скопировать ссылку';},2000);
    }

    document.addEventListener('DOMContentLoaded', loadPost);
  })();
  </script>
