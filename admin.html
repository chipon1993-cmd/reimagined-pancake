<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>// ADMIN · AC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #050810;
      --surface: rgba(10,16,30,0.9);
      --s2:      rgba(13,20,38,0.95);
      --border:  rgba(0,212,255,0.12);
      --border-h:rgba(0,212,255,0.45);
      --accent:  #00d4ff;
      --accent2: #a855f7;
      --text:    #f1f5f9;
      --muted:   #64748b;
      --danger:  #ef4444;
      --success: #00ff88;
      --r:       10px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      cursor: none;
    }

    /* Grid background */
    body::before {
      content:'';
      position: fixed; inset:0; z-index:-2;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: grid-d 30s linear infinite;
      pointer-events: none;
    }
    @keyframes grid-d { 0%{background-position:0 0} 100%{background-position:40px 40px} }

    body::after {
      content:''; position:fixed; inset:0; z-index:-1;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(5,8,16,0.85) 100%);
      pointer-events:none;
    }

    /* Custom cursor */
    .cdot { position:fixed; width:6px; height:6px; background:var(--accent); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); box-shadow:0 0 10px var(--accent),0 0 20px var(--accent); transition:width .15s,height .15s,background .15s; }
    .cring { position:fixed; width:28px; height:28px; border:1px solid rgba(0,212,255,0.5); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); }

    /* ═══════════════════ LOGIN ═══════════════════ */
    #login-screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    .login-wrap {
      width: 100%; max-width: 440px;
      position: relative;
    }

    /* Угловые декорации */
    .login-corner {
      position: absolute; width: 20px; height: 20px;
      border-color: var(--accent); border-style: solid; opacity: 0.6;
    }
    .login-corner.tl { top:-8px; left:-8px; border-width:2px 0 0 2px; }
    .login-corner.tr { top:-8px; right:-8px; border-width:2px 2px 0 0; }
    .login-corner.bl { bottom:-8px; left:-8px; border-width:0 0 2px 2px; }
    .login-corner.br { bottom:-8px; right:-8px; border-width:0 2px 2px 0; }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 52px 48px;
      backdrop-filter: blur(20px);
      position: relative;
    }

    .login-tag {
      font-size: .68rem; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
      color: var(--accent); margin-bottom: 12px;
      text-shadow: 0 0 10px rgba(0,212,255,0.5);
    }
    .login-tag::before { content:'// '; opacity:.6; }

    .login-title {
      font-size: 2rem; font-weight:900; letter-spacing:-.02em;
      margin-bottom: 6px;
    }
    .login-title span { color:var(--accent); text-shadow: 0 0 16px rgba(0,212,255,0.5); }

    .login-sub { font-size:.85rem; color:var(--muted); margin-bottom:40px; }

    .login-err {
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.3);
      border-radius:8px; padding:12px 16px;
      font-size:.85rem; color:#f87171;
      margin-bottom:20px; display:none;
    }

    .field { margin-bottom:20px; }
    .field label {
      display:block; font-size:.68rem; font-weight:700;
      letter-spacing:.18em; text-transform:uppercase;
      color:var(--muted); margin-bottom:8px;
    }
    .field input {
      width:100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius:6px; padding:13px 16px;
      color:var(--text); font-size:.95rem;
      outline:none; transition:border-color .2s, box-shadow .2s;
      font-family:inherit;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 16px rgba(0,212,255,0.15);
    }

    .login-btn {
      width:100%; padding:14px;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius:6px;
      color: var(--accent);
      font-size:.85rem; font-weight:700;
      letter-spacing:.16em; text-transform:uppercase;
      cursor:pointer; transition:.25s;
      position: relative; overflow:hidden;
    }
    .login-btn::before {
      content:'';
      position:absolute; inset:0;
      background: var(--accent);
      transform: translateX(-100%);
      transition: transform .35s ease;
    }
    .login-btn:hover::before { transform: translateX(0); }
    .login-btn span { position:relative; z-index:1; transition:color .35s; }
    .login-btn:hover span { color:#000; }

    /* ═══════════════════ ADMIN ═══════════════════ */
    #admin-panel { display:none; min-height:100vh; flex-direction:column; }

    /* Header */
    .adm-header {
      background: rgba(5,8,16,0.9);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex; align-items:center; justify-content:space-between;
      position: sticky; top:0; z-index:50;
      backdrop-filter: blur(20px);
    }
    .adm-header::after {
      content:''; position:absolute; bottom:-1px; left:0; right:0; height:1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity:.35;
    }

    .adm-logo {
      font-size:.95rem; font-weight:900; letter-spacing:.1em; text-transform:uppercase;
    }
    .adm-logo span { color:var(--accent); text-shadow:0 0 10px var(--accent); }
    .adm-subtitle { font-size:.7rem; color:var(--muted); letter-spacing:.14em; text-transform:uppercase; padding-left:16px; border-left:1px solid var(--border); }

    .adm-hdr-l, .adm-hdr-r { display:flex; align-items:center; gap:16px; }

    /* Buttons */
    .xbtn {
      padding:8px 18px; border-radius:4px;
      font-size:.75rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
      cursor:pointer; border:1px solid; transition:.2s;
      text-decoration:none; display:inline-flex; align-items:center; gap:6px;
      font-family:inherit;
    }
    .xbtn.cyan { color:var(--accent); border-color:rgba(0,212,255,0.3); background:transparent; }
    .xbtn.cyan:hover { background:rgba(0,212,255,0.1); border-color:var(--accent); box-shadow:0 0 14px rgba(0,212,255,0.2); }
    .xbtn.red { color:#f87171; border-color:rgba(239,68,68,.3); background:transparent; }
    .xbtn.red:hover { background:rgba(239,68,68,.08); }
    .xbtn.save { color:#000; background:var(--accent); border-color:var(--accent); box-shadow:0 0 20px rgba(0,212,255,0.35); }
    .xbtn.save:hover { box-shadow:0 0 35px rgba(0,212,255,0.55); transform:translateY(-1px); }

    /* Layout */
    .adm-layout { display:flex; flex:1; }

    /* Sidebar */
    .adm-sidebar {
      width: 230px; flex-shrink:0;
      background: rgba(5,8,16,0.7);
      border-right: 1px solid var(--border);
      padding: 28px 0;
      min-height: calc(100vh - 55px);
      backdrop-filter: blur(12px);
    }

    .sb-label {
      font-size:.62rem; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
      color:var(--muted); padding:0 22px; margin-bottom:10px;
    }
    .sb-label::before { content:'// '; color:var(--accent); opacity:.5; }

    .sb-item {
      display:flex; align-items:center; gap:12px;
      padding:11px 22px; cursor:pointer;
      font-size:.82rem; font-weight:600; letter-spacing:.06em;
      color:var(--muted); transition:.2s;
      border-left:2px solid transparent;
      text-transform:uppercase;
    }
    .sb-item:hover { color:var(--text); background:rgba(0,212,255,0.04); }
    .sb-item.active {
      color:var(--accent);
      background: rgba(0,212,255,0.07);
      border-left-color: var(--accent);
      text-shadow: 0 0 10px rgba(0,212,255,0.4);
    }
    .sb-icon { font-size:1rem; }
    .sb-div { height:1px; background:var(--border); margin:16px 0; }

    /* Status dot */
    .sb-status {
      margin: 20px 22px 0;
      padding: 12px 14px;
      background: rgba(0,255,136,0.05);
      border: 1px solid rgba(0,255,136,0.15);
      border-radius:6px;
      font-size:.7rem; color:rgba(0,255,136,0.7);
      letter-spacing:.08em;
      display:flex; align-items:center; gap:8px;
    }
    .sb-status::before {
      content:''; width:6px; height:6px; border-radius:50%;
      background:var(--success); flex-shrink:0;
      box-shadow:0 0 6px var(--success);
      animation:pulse2 2s infinite;
    }
    @keyframes pulse2{0%,100%{opacity:1}50%{opacity:.4}}

    /* Main */
    .adm-main {
      flex:1; padding:40px 52px 120px;
      overflow-y:auto;
    }

    .ed-header { margin-bottom:40px; }
    .ed-header .ed-tag {
      font-size:.68rem; font-weight:700; letter-spacing:.2em; text-transform:uppercase;
      color:var(--accent); margin-bottom:8px;
      text-shadow:0 0 8px rgba(0,212,255,0.5);
    }
    .ed-header .ed-tag::before { content:'// '; opacity:.6; }
    .ed-header h2 { font-size:1.6rem; font-weight:900; letter-spacing:-.01em; }
    .ed-header p { font-size:.85rem; color:var(--muted); margin-top:6px; }

    /* Form */
    .fg { margin-bottom:22px; }
    .flbl {
      display:block; font-size:.65rem; font-weight:700;
      letter-spacing:.18em; text-transform:uppercase;
      color:var(--muted); margin-bottom:8px;
    }
    .fi {
      width:100%;
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border);
      border-radius:6px; padding:11px 14px;
      color:var(--text); font-size:.9rem;
      outline:none; transition:border-color .2s,box-shadow .2s;
      font-family:inherit;
    }
    .fi:focus { border-color:var(--accent); box-shadow:0 0 14px rgba(0,212,255,0.12); }
    textarea.fi { resize:vertical; min-height:80px; line-height:1.6; }
    .frow { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .fsec {
      font-size:.72rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
      color:var(--accent); margin:40px 0 16px;
      padding-bottom:10px;
      border-bottom:1px solid var(--border);
      text-shadow:0 0 8px rgba(0,212,255,0.3);
    }
    .fsec::before { content:'// '; opacity:.6; }

    /* List */
    .leditor { display:flex; flex-direction:column; gap:10px; margin-bottom:10px; }

    .li-item {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius:8px; overflow:hidden;
      transition: border-color .2s;
    }
    .li-item:hover { border-color:rgba(0,212,255,0.25); }

    .li-hdr {
      display:flex; align-items:center; gap:12px;
      padding:12px 16px; cursor:pointer; user-select:none;
    }
    .li-hdr:hover { background:rgba(0,212,255,0.03); }

    .li-idx {
      font-size:.65rem; font-weight:700; letter-spacing:.1em;
      color:var(--accent); opacity:.6; flex-shrink:0; width:20px;
    }
    .li-title { flex:1; font-size:.88rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .li-acts { display:flex; gap:4px; flex-shrink:0; }
    .lib {
      background:none; border:none; cursor:pointer;
      padding:4px 8px; border-radius:4px;
      font-size:.8rem; color:var(--muted); transition:.15s;
      font-family:inherit;
    }
    .lib:hover { background:rgba(255,255,255,.06); color:var(--text); }
    .lib.del:hover { color:#f87171; }

    .li-body { padding:0 16px 16px; display:none; }
    .li-body.open { display:block; }
    .li-body .fg { margin-bottom:12px; }
    .li-body .fg:last-child { margin-bottom:0; }

    .add-btn {
      display:flex; align-items:center; gap:8px;
      padding:11px 16px;
      background:transparent;
      border:1px dashed rgba(0,212,255,0.2);
      border-radius:8px;
      color:var(--muted); font-size:.82rem; letter-spacing:.06em; text-transform:uppercase;
      cursor:pointer; width:100%; transition:.2s;
      font-family:inherit;
    }
    .add-btn:hover { border-color:var(--accent); color:var(--accent); box-shadow:0 0 12px rgba(0,212,255,0.1); }

    /* Save bar */
    .save-bar {
      position:fixed; bottom:0; left:230px; right:0;
      background: rgba(5,8,16,0.92);
      border-top:1px solid var(--border);
      padding:14px 52px;
      display:flex; align-items:center; justify-content:space-between;
      z-index:40;
      backdrop-filter:blur(20px);
    }
    .save-bar::before {
      content:''; position:absolute; top:-1px; left:0; right:0; height:1px;
      background: linear-gradient(90deg, transparent, var(--accent2), transparent);
      opacity:.3;
    }

    .save-status { font-size:.75rem; color:var(--muted); letter-spacing:.08em; }
    .save-status.ok { color:var(--success); text-shadow:0 0 8px rgba(0,255,136,0.4); }

    /* Toast */
    .toast {
      position:fixed; top:24px; right:24px;
      background:rgba(0,255,136,0.1);
      border:1px solid rgba(0,255,136,0.3);
      color:var(--success);
      padding:12px 20px; border-radius:8px;
      font-size:.82rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
      z-index:999; opacity:0; transform:translateY(-12px);
      transition:.3s; pointer-events:none;
      text-shadow:0 0 8px rgba(0,255,136,0.4);
      box-shadow:0 0 20px rgba(0,255,136,0.1);
    }
    .toast.show { opacity:1; transform:translateY(0); }

    /* Scrollbar */
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(0,212,255,0.2); border-radius:4px; }
    ::-webkit-scrollbar-thumb:hover { background:rgba(0,212,255,0.4); }

    /* ── NEW FEATURES ── */
    .save-bar-l { display:flex; flex-direction:column; gap:2px; }
    .save-auto  { font-size:.65rem; color:var(--muted); letter-spacing:.06em; }
    .chk-row { display:flex; align-items:center; gap:10px; margin-top:6px; cursor:pointer; }
    .chk-row input[type=checkbox] { width:16px; height:16px; accent-color:var(--accent); cursor:pointer; flex-shrink:0; }
    .chk-row span { font-size:.9rem; color:var(--text); }
    .backup-row { display:flex; gap:12px; flex-wrap:wrap; margin-top:4px; }
    .imp-label { display:inline-flex; align-items:center; gap:6px; cursor:pointer; }
    .sec-msg-ok  { color:var(--success); text-shadow:0 0 8px rgba(0,255,136,0.3); }
    .sec-msg-err { color:#f87171; }
    .seo-hint { font-size:.75rem; color:var(--muted); margin-top:4px; font-style:italic; }
    .seo-cnt { font-size:.72rem; margin-top:5px; display:block; letter-spacing:.03em; min-height:16px; }
    .seo-cnt.ok   { color:var(--success); }
    .seo-cnt.warn { color:#fbbf24; }
    .seo-cnt.bad  { color:#f87171; }
    .bk-item { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 14px; background:var(--s2); border:1px solid var(--border); border-radius:6px; margin-bottom:8px; }
    .bk-meta strong { color:var(--text); font-size:.82rem; }
    .bk-meta span   { color:var(--muted); font-size:.78rem; }
    .fhint { font-size:.73rem; color:var(--muted); margin-top:4px; margin-bottom:0; font-style:italic; opacity:.7; }
    .warn-panel { position:fixed; bottom:55px; left:230px; right:0; background:rgba(251,191,36,0.06); border-top:1px solid rgba(251,191,36,0.2); padding:12px 52px; z-index:39; }
    .warn-panel ul { margin:4px 0 0 16px; padding:0; font-size:.75rem; color:#fbbf24; opacity:.9; }
    .warn-panel-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
    .warn-panel-title { font-size:.72rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#fbbf24; }
    .warn-panel-x { background:none; border:none; cursor:pointer; color:#fbbf24; font-size:1rem; opacity:.7; padding:0; }
    .warn-panel-x:hover { opacity:1; }
    @media(max-width:900px){ .warn-panel { left:0; padding:12px 16px; } }

    /* Admin language switcher */
    .adm-lang-sw {
      display:flex; gap:3px;
      background:rgba(0,0,0,0.35); border:1px solid var(--border);
      border-radius:6px; padding:3px;
    }
    .alb {
      background:none; border:none; cursor:pointer;
      padding:5px 11px; border-radius:4px;
      font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
      color:var(--muted); transition:.15s; font-family:inherit;
    }
    .alb:hover { color:var(--text); background:rgba(255,255,255,.05); }
    .alb.active { background:var(--accent); color:#000; box-shadow:0 0 10px rgba(0,212,255,0.4); }
    .lang-badge {
      display:inline-block; background:rgba(0,212,255,0.12); border:1px solid rgba(0,212,255,0.25);
      color:var(--accent); font-size:.62rem; font-weight:700; letter-spacing:.12em;
      padding:2px 8px; border-radius:999px; text-transform:uppercase; margin-left:10px;
      vertical-align:middle;
    }

    /* ═══════ MOBILE ADMIN ═══════ */
    @media (max-width: 900px) {
      body { cursor: auto; }
      .cdot, .cring { display: none; }

      .adm-layout { flex-direction: column; }

      .adm-sidebar {
        width: 100%;
        min-height: auto;
        padding: 12px 0;
        border-right: none;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        align-items: center;
      }
      .sb-label { display: none; }
      .sb-div { display: none; }
      .sb-status { display: none; }
      .sb-item {
        padding: 8px 14px;
        font-size: .72rem;
        border-left: none;
        border-bottom: 2px solid transparent;
        white-space: nowrap;
      }
      .sb-item.active {
        border-left-color: transparent;
        border-bottom-color: var(--accent);
      }
      .sb-icon { font-size: .85rem; }

      .adm-main { padding: 16px !important; }
      .adm-main h2 { font-size: 1.2rem !important; }

      .sec-header { flex-direction: column; align-items: flex-start !important; gap: 8px; }

      .field input, .field textarea, .field select {
        font-size: 16px !important; /* prevent iOS zoom */
      }

      .xbtn { font-size: .72rem; padding: 8px 14px; }

      .login-card { padding: 32px 24px; }

      .adm-topbar { padding: 12px 16px !important; }
      .adm-topbar span { font-size: .7rem !important; }
    }

    @media (max-width: 500px) {
      .adm-sidebar { padding: 8px 4px; }
      .sb-item { padding: 6px 10px; font-size: .65rem; gap: 6px; }
    }
  </style>
</head>
<body>

<!-- CURSOR -->
<div class="cdot" id="cdot"></div>
<div class="cring" id="cring"></div>

<!-- ═════════════════════ LOGIN ═════════════════════ -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-corner tl"></div>
    <div class="login-corner tr"></div>
    <div class="login-corner bl"></div>
    <div class="login-corner br"></div>
    <div class="login-card">
      <div class="login-tag">System Access</div>
      <div class="login-title">A<span>.</span>C Admin</div>
      <div class="login-sub">Панель управления сайтом</div>
      <div class="login-err" id="login-err">Неверный email или пароль</div>
      <div class="field">
        <label>Идентификатор</label>
        <input type="email" id="inp-email" placeholder="user@domain.com" autocomplete="username" />
      </div>
      <div class="field">
        <label>Код доступа</label>
        <input type="password" id="inp-pass" placeholder="••••••••••"
               autocomplete="current-password"
               onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <button class="login-btn" onclick="doLogin()"><span>→ Войти в систему</span></button>
    </div>
  </div>
</div>

<!-- ═════════════════════ ADMIN ═════════════════════ -->
<div id="admin-panel">

  <div class="adm-header">
    <div class="adm-hdr-l">
      <div class="adm-logo">A<span>.</span>C</div>
      <div class="adm-subtitle">Control Panel</div>
    </div>
    <div class="adm-hdr-r">
      <button class="xbtn cyan" onclick="toggleAllItems('open')"  title="Раскрыть все блоки">▾ Развернуть</button>
      <button class="xbtn cyan" onclick="toggleAllItems('close')" title="Свернуть все блоки">▴ Свернуть</button>
      <div class="adm-lang-sw" title="Язык редактирования">
        <button class="alb active" data-alang="ru" onclick="switchAdminLang('ru')">RU</button>
        <button class="alb"        data-alang="uk" onclick="switchAdminLang('uk')">UK</button>
        <button class="alb"        data-alang="no" onclick="switchAdminLang('no')">NO</button>
      </div>
      <button class="xbtn cyan" onclick="previewSite()" title="Предпросмотр несохранённых изменений в новой вкладке">👁 Предпросмотр</button>

<script>

// ── CURSOR ───────────────────────────────────
const cdot = document.getElementById('cdot');
const cring = document.getElementById('cring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',(e)=>{ mx=e.clientX; my=e.clientY; cdot.style.left=mx+'px'; cdot.style.top=my+'px'; });
(function anim(){ rx+=(mx-rx)*.11; ry+=(my-ry)*.11; cring.style.left=rx+'px'; cring.style.top=ry+'px'; requestAnimationFrame(anim); })();

// ── AUTH ─────────────────────────────────────
async function sha256(s) {
  const b = await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const email = document.getElementById('inp-email').value.trim();
  const pass  = document.getElementById('inp-pass').value;
  const err   = document.getElementById('login-err');
  err.style.display='none';
  if (!email||!pass){ err.textContent='Введите данные'; err.style.display='block'; return; }
  const inputHash = await sha256(email+':'+pass);
  const stored    = localStorage.getItem('ac_admin_hash');
  if (!stored) {
    const expected = await sha256('chipon1993@gmail.com:Kunfor527_');
    if (inputHash===expected){ localStorage.setItem('ac_admin_hash',inputHash); grantAccess(); }
    else { err.textContent='Неверный идентификатор или код'; err.style.display='block'; }
  } else {
    if (inputHash===stored) grantAccess();
    else { err.textContent='Неверный идентификатор или код'; err.style.display='block'; }
  }
}

function grantAccess(){
  sessionStorage.setItem('ac_s','1');
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-panel').style.display='flex';
  updateAdminLangBtns();
  showTab('index');
}

function doLogout(){
  sessionStorage.removeItem('ac_s');
  document.getElementById('admin-panel').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

// ── DATA ─────────────────────────────────────
function deepMerge(base,over){
  if(!over) return base;
  const r=Object.assign({},base);
  for(const k of Object.keys(over)){
    if(Array.isArray(over[k])) r[k]=over[k];
    else if(over[k]&&typeof over[k]==='object') r[k]=deepMerge(base[k]||{},over[k]);
    else r[k]=over[k];
  }
  return r;
}

let adminLang='ru';

function langKey(lang){ return lang==='ru'?'ac_content':'ac_content_'+lang; }

function getDataForLang(lang){
  // 1. Defaults
  let base=JSON.parse(JSON.stringify(window.AC_DEFAULTS));
  // 2. Language translations
  if(lang!=='ru'&&window.AC_TRANSLATIONS&&window.AC_TRANSLATIONS[lang]){
    base=deepMerge(base,window.AC_TRANSLATIONS[lang]);
  }
  // 3. Russian master edits (always applied — changes propagate to all languages)
  const ruSaved=localStorage.getItem('ac_content');
  if(ruSaved){ try{ base=deepMerge(base,JSON.parse(ruSaved)); }catch(e){} }
  // 4. Language-specific overrides (UK/NO fine-tuning)
  if(lang!=='ru'){
    const langSaved=localStorage.getItem(langKey(lang));
    if(langSaved){ try{ base=deepMerge(base,JSON.parse(langSaved)); }catch(e){} }
  }
  // 5. Restore nav translations lost during RU master merge (step 3).
  //    Per-key: only fill keys the admin hasn't explicitly overridden in step 4.
  if(lang!=='ru'&&window.AC_TRANSLATIONS&&window.AC_TRANSLATIONS[lang]){
    const transNav=window.AC_TRANSLATIONS[lang].global&&window.AC_TRANSLATIONS[lang].global.nav;
    if(transNav&&base.global){
      let adminNav={};
      try{const ld=JSON.parse(localStorage.getItem(langKey(lang))||'{}');adminNav=(ld.global&&ld.global.nav)||{};}catch(e){}
      Object.keys(transNav).forEach(k=>{ if(!adminNav[k]) base.global.nav[k]=transNav[k]; });
    }
  }
  return base;
}

let D=getDataForLang('ru');

// ── LANG SWITCH (admin editor) ────────────────
function switchAdminLang(lang){
  if(lang===adminLang) return;
  collectCurrent();
  persistCurrentLang();          // auto-save current lang before switching
  adminLang=lang;
  D=getDataForLang(lang);
  updateAdminLangBtns();
  const savedCT=CT; CT='';      // CT='' → showTab's collectCurrent() finds no match → не перезапишет D
  showTab(savedCT);
  showToast('// Язык редактора: '+lang.toUpperCase());
}

function persistCurrentLang(){
  localStorage.setItem(langKey(adminLang),JSON.stringify(D));
}

function updateAdminLangBtns(){
  document.querySelectorAll('.alb').forEach(b=>b.classList.toggle('active',b.dataset.alang===adminLang));
  // Update save bar hint
  const hints={ru:'Русский',uk:'Українська',no:'Norsk'};
  const el=document.getElementById('save-lang');
  if(el) el.textContent=hints[adminLang]||adminLang.toUpperCase();
}

let isDirty=false, autoSec=60;
function markDirty(){ isDirty=true; }

function validateBeforeSave(){
  const w=[];
  // Контакты с плейсхолдерами
  if(D.contact&&D.contact.items){
    D.contact.items.forEach((it,i)=>{
      if(!it.href||it.href==='#'||it.href.includes('yourusername')||it.href.includes('your@email')){
        w.push('Контакт «'+(it.label||'#'+(i+1))+'»: заполни настоящую ссылку');
      }
    });
  }
  // Опубликованные видео без заголовка или ID
  if(D.videos&&D.videos.items){
    D.videos.items.filter(v=>v.published!==false).forEach((v,i)=>{
      if(!v.title) w.push('Видео #'+(i+1)+': пустой заголовок');
      if(v.type!=='file'&&!v.embedId) w.push('Видео «'+(v.title||'#'+(i+1))+'»: не заполнен ID видео');
    });
  }
  // Пустые заголовки страниц
  [{k:'about',n:'О себе'},{k:'journey',n:'Мой путь'},{k:'interests',n:'Интересы'},{k:'contact',n:'Контакт'},{k:'videos',n:'Видео'}].forEach(({k,n})=>{
    if(D[k]&&!D[k].pageTitle) w.push('Страница «'+n+'»: пустой заголовок');
  });
  return w;
}

function showValidationWarnings(warns){
  const old=document.getElementById('warn-panel');
  if(old)old.remove();
  if(!warns.length)return;
  const p=document.createElement('div');
  p.id='warn-panel'; p.className='warn-panel';
  p.innerHTML='<div class="warn-panel-hd"><span class="warn-panel-title">⚠ '+warns.length+(warns.length===1?' предупреждение':warns.length<5?' предупреждения':' предупреждений')+' — данные сохранены, но проверь</span>'
    +'<button class="warn-panel-x" onclick="document.getElementById(\'warn-panel\').remove()" title="Закрыть">✕</button></div>'
    +'<ul>'+warns.map(w=>'<li>'+w+'</li>').join('')+'</ul>';
  document.body.appendChild(p);
}

// ── PREVIEW ──────────────────────────────────
function previewSite(){
  collectCurrent();
  // Map admin tab → site page file
  const pageMap={
    index:'index.html', about:'about.html', journey:'journey.html',
    interests:'interests.html', videos:'videos.html', contact:'contact.html'
  };
  const file = pageMap[CT] || 'index.html';
  // Write full current state snapshot (for getData() in loader.js)
  localStorage.setItem('ac_preview', JSON.stringify(D));
  window.open(file+'?preview=1', '_blank');
  showToast('// Предпросмотр → '+file);
}

// ── BACKUPS ──────────────────────────────────
function pushBackup(){
  try{
    const backups=JSON.parse(localStorage.getItem('ac_backups')||'[]');
    backups.unshift({ts:Date.now(), lang:adminLang, data:JSON.stringify(D)});
    if(backups.length>5) backups.length=5;
    localStorage.setItem('ac_backups',JSON.stringify(backups));
  }catch(e){}
}

function renderBackups(){
  try{
    const backups=JSON.parse(localStorage.getItem('ac_backups')||'[]');
    if(!backups.length) return '<p style="color:var(--muted);font-size:.85rem;">Сохранений пока нет — появятся после первого нажатия «Сохранить»</p>';
    const fmtDate=ts=>{
      const d=new Date(ts);
      return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
    };
    const hints={ru:'Русский',uk:'Українська',no:'Norsk'};
    return backups.map((b,i)=>`<div class="bk-item">
      <div class="bk-meta"><strong>${fmtDate(b.ts)}</strong> &nbsp;<span>· ${hints[b.lang]||b.lang.toUpperCase()}</span></div>
      <button class="xbtn cyan" style="padding:6px 14px;font-size:.72rem;" onclick="restoreBackup(${i})">↩ Восстановить</button>
    </div>`).join('');
  }catch(e){ return '<p style="color:#f87171;font-size:.85rem;">Ошибка чтения бэкапов</p>'; }
}

function restoreBackup(i){
  try{
    const backups=JSON.parse(localStorage.getItem('ac_backups')||'[]');
    const b=backups[i];
    if(!b) return;
    const ts=new Date(b.ts).toLocaleString('ru-RU');
    if(!confirm('Восстановить версию от '+ts+'?\n\nТекущие несохранённые изменения будут потеряны.')) return;
    D=JSON.parse(b.data);
    adminLang=b.lang;
    updateAdminLangBtns();
    persistCurrentLang();
    showToast('// Версия от '+ts+' восстановлена');
    showTab(CT);
  }catch(e){ alert('Ошибка восстановления: '+e.message); }
}

function saveAll(){
  collectCurrent();
  pushBackup();
  persistCurrentLang();
  isDirty=false; autoSec=60;
  document.getElementById('save-auto').textContent='';
  const st=document.getElementById('save-st');
  const hints={ru:'RU',uk:'UK',no:'NO'};
  st.textContent='✓ Сохранено ('+hints[adminLang]+')'; st.className='save-status ok';
  setTimeout(()=>{ st.textContent='Изменения не сохранены'; st.className='save-status'; },3000);
  const warns=validateBeforeSave();
  if(warns.length){
    showValidationWarnings(warns);
    showToast('// Сохранено · ⚠ '+warns.length+' предупреждений');
  } else {
    const old=document.getElementById('warn-panel');
    if(old)old.remove();
    showToast('// Сохранено · '+adminLang.toUpperCase());
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── HELPERS ──────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escTA(s){ return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function v(id){ const el=document.getElementById(id); return el?el.value:''; }
function inp(id,val){ return `<input class="fi" id="${id}" value="${esc(val)}"/>`; }
function dateinp(id,val){ return `<input class="fi" type="date" id="${id}" value="${esc(val)}"/>`; }
function ta(id,val,rows=3){ return `<textarea class="fi" id="${id}" rows="${rows}">${escTA(val)}</textarea>`; }
function fg(label,content,hint){ return `<div class="fg"><label class="flbl">${label}</label>${content}${hint?'<p class="fhint">'+hint+'</p>':''}</div>`; }

function liW(idx,title,fields){
  const n=String(idx+1).padStart(2,'0');
  return `<div class="li-item" data-idx="${idx}">
    <div class="li-hdr" onclick="toggleLI(this)">
      <span class="li-idx">${n}</span>
      <span class="li-title">${esc(title)}</span>
      <div class="li-acts">
        <button class="lib" onclick="event.stopPropagation();mvUp(this)"  title="Вверх">↑</button>
        <button class="lib" onclick="event.stopPropagation();mvDn(this)"  title="Вниз">↓</button>
        <button class="lib" onclick="event.stopPropagation();dupLI(this)" title="Дублировать">⧉</button>
        <button class="lib del" onclick="event.stopPropagation();delLI(this)" title="Удалить">✕</button>
      </div>
    </div>
    <div class="li-body">${fields}</div>
  </div>`;
}

function toggleLI(h){ h.nextElementSibling.classList.toggle('open'); }
function mvUp(btn){ const li=btn.closest('.li-item'),p=li.parentElement,all=[...p.querySelectorAll(':scope>.li-item')],i=all.indexOf(li); if(i>0)p.insertBefore(li,all[i-1]); }
function mvDn(btn){ const li=btn.closest('.li-item'),p=li.parentElement,all=[...p.querySelectorAll(':scope>.li-item')],i=all.indexOf(li); if(i<all.length-1)p.insertBefore(all[i+1],li); }
function delLI(btn){ if(confirm('Удалить?'))btn.closest('.li-item').remove(); }

function dupLI(btn){
  const li=btn.closest('.li-item'), led=btn.closest('.leditor');
  if(!li||!led) return;
  collectCurrent();
  const items=[...led.querySelectorAll(':scope>.li-item')], pos=items.indexOf(li);
  if(pos<0) return;
  const cloneArr = (arr,i) => arr.splice(i+1,0,JSON.parse(JSON.stringify(arr[i])));
  const map={
    'ls-nc': ()=>{ cloneArr(D.index.navCards,pos);   showTab('index');     },
    'ls-hs': ()=>{ cloneArr(D.index.heroStats,pos);  showTab('index');     },
    'ls-p':  ()=>{ D.about.paragraphs.splice(pos+1,0,D.about.paragraphs[pos]); showTab('about'); },
    'ls-st': ()=>{ cloneArr(D.about.stats,pos);      showTab('about');     },
    'ls-v':  ()=>{ cloneArr(D.about.values,pos);     showTab('about');     },
    'ls-jn': ()=>{ cloneArr(D.journey.items,pos);    showTab('journey');   },
    'ls-in': ()=>{ cloneArr(D.interests.cards,pos);  showTab('interests'); },
    'ls-ci': ()=>{ cloneArr(D.contact.items,pos);    showTab('contact');   },
    'ls-cp': ()=>{ D.contact.textParagraphs.splice(pos+1,0,D.contact.textParagraphs[pos]); showTab('contact'); },
    'ls-tp': ()=>{ D.contact.topics.splice(pos+1,0,D.contact.topics[pos]); showTab('contact'); },
    'ls-vid':()=>{ if(!D.videos)D.videos={items:[]}; cloneArr(D.videos.items,pos); showTab('videos'); },
  };
  if(map[led.id]){ CT=''; map[led.id](); showToast('// Элемент продублирован'); }
}

function toggleAllItems(action){
  document.querySelectorAll('#adm-main .li-body').forEach(b=>b.classList[action==='open'?'add':'remove']('open'));
}

// ── TABS ─────────────────────────────────────
let CT='index';
function showTab(tab){
  collectCurrent(); CT=tab;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
  const m=document.getElementById('adm-main');
  switch(tab){
    case 'index':      m.innerHTML=edIndex();      break;
    case 'about':      m.innerHTML=edAbout();      break;
    case 'journey':    m.innerHTML=edJourney();    break;
    case 'interests':  m.innerHTML=edInterests();  break;
    case 'contact':    m.innerHTML=edContact();    break;
    case 'global':     m.innerHTML=edGlobal();     break;
    case 'videos':     m.innerHTML=edVideos();     break;
    case 'boards':     m.innerHTML=edBoards();     break;
    case 'seo':        m.innerHTML=edSEO(); initSeoCounters(); break;
    case 'appearance': m.innerHTML=edAppearance(); break;
    case 'security':   m.innerHTML=edSecurity();   break;
    case 'i18n':       m.innerHTML=edTranslations(); break;
  }
}
function collectCurrent(){
  switch(CT){
    case 'index':      colIndex();      break;
    case 'about':      colAbout();      break;
    case 'journey':    colJourney();    break;
    case 'interests':  colInterests();  break;
    case 'contact':    colContact();    break;
    case 'global':     colGlobal();     break;
    case 'videos':     colVideos();     break;
    case 'boards':     colBoards();     break;
    case 'seo':        colSEO();        break;
    case 'appearance': colAppearance(); break;
    case 'i18n':       colTranslations(); break;
  }
}

// ── INDEX ────────────────────────────────────
function edIndex(){

  return `<div class="ed-header"><div class="ed-tag">Главная страница</div><h2>Hero & Menu</h2><p>Главный экран, кнопки, карточки навигации и цитата</p></div>
  ${fg('Бейдж',inp('i-badge',d.badge),'Текст в плашке над главным заголовком, напр. «Украина → Мир → Норвегия»')}
  ${fg('Tagline',inp('i-tl',d.tagline),'Главная фраза — первое, что видит посетитель на сайте')}
  ${fg('Подпись под tagline',ta('i-sub',d.sub,2),'Дополнительный текст под основной фразой')}
  <div class="frow">${fg('Кнопка 1 — текст',inp('i-b1t',d.btnPrimary?.text),'Основная кнопка (яркая)')}${fg('Кнопка 1 — ссылка',inp('i-b1h',d.btnPrimary?.href),'Куда ведёт, напр. journey.html')}</div>
  <div class="frow">${fg('Кнопка 2 — текст',inp('i-b2t',d.btnGhost?.text),'Второстепенная кнопка (контур)')}${fg('Кнопка 2 — ссылка',inp('i-b2h',d.btnGhost?.href),'Куда ведёт, напр. about.html')}</div>
  ${fg('Цитата',ta('i-qt',d.quote,3),'Блок с цитатой внизу главной страницы')}
  ${fg('Автор цитаты',inp('i-qa',d.quoteAuthor),'Подпись под цитатой')}
  <div class="fsec">Счётчики (Hero-статистика)</div>
  <div class="leditor" id="ls-hs">
    ${(d.heroStats||[]).map((s,i)=>liW(i,s.num+' '+s.lbl,
      fg('Число / текст',inp(`hs-n-${i}`,s.num))+
      fg('Подпись',inp(`hs-l-${i}`,s.lbl))
    )).join('')}
  </div>
  <button class="add-btn" onclick="addHS()">+ Добавить счётчик</button>
  <div class="fsec">Карточки-меню</div>
  <div class="leditor" id="ls-nc">
    ${(d.navCards||[]).map((c,i)=>liW(i,c.title,
      fg('Иконка (эмодзи)',inp(`nc-ic-${i}`,c.icon))+
      fg('Заголовок',inp(`nc-ti-${i}`,c.title))+
      fg('Описание',ta(`nc-de-${i}`,c.desc,2))+
      fg('Ссылка',inp(`nc-hr-${i}`,c.href))
    )).join('')}
  </div>
  <button class="add-btn" onclick="addNC()">+ Добавить карточку</button>`;
}
function colIndex(){
  if(!document.getElementById('i-badge'))return;
  D.index.badge=v('i-badge'); D.index.tagline=v('i-tl'); D.index.sub=v('i-sub');
  D.index.btnPrimary={text:v('i-b1t'),href:v('i-b1h')};
  D.index.btnGhost={text:v('i-b2t'),href:v('i-b2h')};

function resetAll(){
  const hints={ru:'русского',uk:'украинского',no:'норвежского'};
  if(!confirm('Сбросить изменения '+hints[adminLang]+' языка? Необратимо.'))return;
  localStorage.removeItem(langKey(adminLang));
  D=getDataForLang(adminLang);
  showToast('// Данные сброшены ('+adminLang.toUpperCase()+')');
  showTab(CT);
}
function exportJSON(){
  collectCurrent();
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='ac-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
  showToast('// Резервная копия скачана');
}
function importJSON(e){
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.global&&!data.index) throw new Error('Неверный формат файла');
      D=deepMerge(JSON.parse(JSON.stringify(window.AC_DEFAULTS)),data);
      localStorage.setItem(langKey(adminLang),JSON.stringify(D));
      showToast('// Данные восстановлены из файла ('+adminLang.toUpperCase()+')');
      showTab(CT);
    }catch(err){ alert('Ошибка: '+err.message); }
  };
  r.readAsText(file);
}

function autoFillVideo(i){
  const url=(document.getElementById(`vid-url-${i}`)?.value||'').trim();
  if(!url) return;
  // YouTube
  let m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{11})/);
  if(m){
    document.getElementById(`vid-tp-${i}`).value='youtube';
    document.getElementById(`vid-ei-${i}`).value=m[1];
    showToast('// YouTube ID: '+m[1]); return;
  }
  // Vimeo
  m=url.match(/vimeo\.com\/(\d+)/);
  if(m){
    document.getElementById(`vid-tp-${i}`).value='vimeo';
    document.getElementById(`vid-ei-${i}`).value=m[1];
    showToast('// Vimeo ID: '+m[1]); return;
  }
  // Direct file
  if(url.match(/\.(mp4|webm|ogg|mov)(\?.*)?$/i)){
    document.getElementById(`vid-tp-${i}`).value='file';
    document.getElementById(`vid-ei-${i}`).value=url;
    showToast('// Файл определён'); return;
  }
  showToast('// Формат не распознан — заполните вручную');
}

function colBoards(){
  if(!document.getElementById('ls-boards')) return;
  const posts=[...document.querySelectorAll('#ls-boards .li-item')].map(li=>{
    const i=li.dataset.idx;
    const type=document.getElementById(`bp-type-${i}`)?.value||'note';
    const tags=(document.getElementById(`bp-tags-${i}`)?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
    const content=document.getElementById(`bp-content-${i}`)?.value||'';
    const title=document.getElementById(`bp-title-${i}`)?.value||'';
    const date=document.getElementById(`bp-date-${i}`)?.value||'';
    const author=document.getElementById(`bp-author-${i}`)?.value||'';
    const url=document.getElementById(`bp-url-${i}`)?.value||'';
    const vurl=document.getElementById(`bp-vurl-${i}`)?.value||'';
    const savedId = document.getElementById(`bp-id-${i}`)?.value;
    const published=!!document.getElementById(`bp-pub-${i}`)?.checked;

    if(type==='quote') post.author=author;
    if(type==='link')  post.url=url;
    if(type==='video' && vurl){
      post.videoUrl=vurl;
      let m=vurl.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);

    }
    return post;
  });
  saveBoardPosts(currentBoard, posts);
}

}

function seoCount(id, type){
  const el=document.getElementById(id);
  const cnt=document.getElementById(id+'-cnt');
  if(!el||!cnt) return;
  const len=el.value.length;
  if(type==='title'){
    const ok=len>=50&&len<=60, warn=len>=40&&len<=70;
    cnt.textContent=len+' / 60 симв.'+(len<50?' — слишком коротко':len>60?' — слишком длинно':' — отлично');
    cnt.className='seo-cnt '+(ok?'ok':warn?'warn':'bad');
  } else {
    const ok=len>=120&&len<=160, warn=len>=100&&len<=180;
    cnt.textContent=len+' / 160 симв.'+(len<120?' — слишком коротко':len>160?' — слишком длинно':' — отлично');
    cnt.className='seo-cnt '+(ok?'ok':warn?'warn':'bad');
  }
}

async function changePassword(){
  const email=document.getElementById('sec-email')?.value.trim();
  const pass=document.getElementById('sec-pass')?.value;
  const pass2=document.getElementById('sec-pass2')?.value;
  const msg=document.getElementById('sec-msg');
  if(!email||!pass){ msg.innerHTML='<span class="sec-msg-err">Заполните все поля</span>'; return; }
  if(pass!==pass2){ msg.innerHTML='<span class="sec-msg-err">Пароли не совпадают</span>'; return; }
  if(pass.length<8){ msg.innerHTML='<span class="sec-msg-err">Пароль минимум 8 символов</span>'; return; }
  const hash=await sha256(email+':'+pass);
  localStorage.setItem('ac_admin_hash',hash);
  msg.innerHTML='<span class="sec-msg-ok">✓ Данные обновлены. При следующем входе используйте новые данные.</span>';
  document.getElementById('sec-email').value='';
  document.getElementById('sec-pass').value='';
  document.getElementById('sec-pass2').value='';
}

  <p style="color:var(--muted);font-size:.85rem;margin-bottom:24px;padding:12px 16px;background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.1);border-radius:8px;line-height:1.7;">
    💡 Здесь — <b style="color:var(--text);">служебные тексты</b>, которые не входят в контент страниц.<br>
    Тексты пунктов меню → таб <b style="color:var(--accent);">Общие</b>.<br>
    Метки разделов (Хронология, Интересы...) → в каждом табе страницы, поле <b style="color:var(--accent);">«Метка раздела»</b>.
  </p>
  ${KEYS.map(({k,label,hint})=>fg(label,inp('tr-'+k,val(k)),hint)).join('')}`;
}

function colTranslations(){
  if(!document.getElementById('tr-open_board'))return;
  const KEYS=['open_board','watch_btn','featured_label','values_title','topics_title','nav_section','menu_label'];
  const ov={};
  KEYS.forEach(k=>{ const v2=document.getElementById('tr-'+k)?.value||''; if(v2)ov[k]=v2; });
  localStorage.setItem('ac_i18n_'+adminLang,JSON.stringify(ov));
  // Обновить AC_I18N в памяти — чтобы изменения сразу применялись при открытии сайта
  if(window.AC_I18N&&window.AC_I18N[adminLang]){
    KEYS.forEach(k=>{ if(ov[k])window.AC_I18N[adminLang][k]=ov[k]; });
  }
}

// ── KEYBOARD / AUTOSAVE / UNLOAD ─────────────
document.addEventListener('keydown', e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); saveAll(); }
});

document.addEventListener('input',  markDirty);
document.addEventListener('change', markDirty);

window.addEventListener('beforeunload', e=>{
  if(isDirty){ e.preventDefault(); e.returnValue=''; }
});

setInterval(()=>{
  if(!sessionStorage.getItem('ac_s')||!isDirty) return;
  autoSec--;
  const el=document.getElementById('save-auto');
  if(autoSec<=0){
    saveAll();
    if(el) el.textContent='';
  } else {
    if(el) el.textContent=`Автосохранение через ${autoSec} с`;
  }
},1000);

// ── INIT ─────────────────────────────────────
if(sessionStorage.getItem('ac_s')){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-panel').style.display='flex';
  updateAdminLangBtns();
  showTab('index');
}
</script>
</body>
</html>
