<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrii Chepelovskyi</title>
  <meta name="description" content="Персональный сайт Андрия Чепеловского. Украина → Мир → Норвегия. Путь, интересы, мысли." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Andrii Chepelovskyi" />
  <meta property="og:description" content="Персональный сайт Андрия Чепеловского. Украина → Мир → Норвегия." />
  <meta property="og:image" content="og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#00d4ff" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* HERO */
    .hero { min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding:120px 0 80px; }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(0,212,255,0.07);
      border: 1px solid rgba(0,212,255,0.25);
      border-radius: 999px; padding: 6px 18px;
      font-size: .78rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
      color: var(--accent); margin-bottom: 32px; width: fit-content;
    }
    .hero-badge::before {
      content:''; width:6px; height:6px;
      background:var(--accent); border-radius:50%;
      animation:pulse 2s infinite;
      box-shadow: 0 0 8px var(--accent);
    }
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.5)}}

    .hero-name {
      font-size: clamp(3rem,8vw,5.8rem);
      font-weight:900; letter-spacing:-.03em; line-height:1.0; margin-bottom:8px;
      text-transform: uppercase;
    }
    .hero-name-line1 { display:block; color: var(--text); }
    .hero-name-line2 {
      display: block;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 20px rgba(0,212,255,0.4));
    }

    .hero-tagline {
      font-size: clamp(1rem,2.2vw,1.25rem);
      color: var(--muted); max-width:580px;
      margin: 20px 0 8px; line-height:1.8;
      letter-spacing: 0.02em;
    }
    .hero-sub {
      font-size:.9rem; color:var(--muted); max-width:500px;
      margin-bottom:52px; font-style:italic; opacity:.65;
    }
    .hero-actions { display:flex; gap:14px; flex-wrap:wrap; }

    /* Счётчик строк снизу */
    .hero-meta {
      display: flex; align-items: center; gap: 40px;
      margin-top: 56px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
      width: fit-content;
    }
    .hero-meta-item {
      display: flex; flex-direction:column; gap:2px;
    }
    .hero-meta-num {
      font-size:1.4rem; font-weight:800; color: var(--accent);
      text-shadow: 0 0 12px rgba(0,212,255,0.5);
    }
    .hero-meta-lbl { font-size:.7rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
    .hero-meta-sep { width:1px; height:32px; background:var(--border); }

    /* SEPARATOR */
    .section-sep { display:flex; align-items:center; gap:20px; margin:80px 0 56px; }
    .section-sep span { font-size:.72rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
    .section-sep::before,.section-sep::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); }

    /* NAV CARDS */
    .nav-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-bottom:80px; }
    .nav-card {
      border-radius:var(--radius); padding:32px 28px;
      text-decoration:none; color:var(--text);
      display:flex; flex-direction:column; gap:10px;
      transition: transform var(--transition);
    }
    .nav-card-icon { font-size:2rem; filter: drop-shadow(0 0 8px rgba(0,212,255,0.4)); }
    .nav-card-title { font-size:1rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; }
    .nav-card-desc { font-size:.85rem; color:var(--muted); line-height:1.5; }
    .nav-card-arrow { margin-top:auto; color:var(--accent); font-size:1.1rem; transition:transform var(--transition); text-shadow:0 0 8px var(--accent); }
    .nav-card:hover .nav-card-arrow { transform:translateX(6px); }

    /* QUOTE */
    .home-quote { border-radius:var(--radius); padding:40px 48px; margin-bottom:80px; }
    .home-quote p { font-size:1.15rem; font-style:italic; color:var(--text); line-height:1.8; margin-bottom:14px; }
    .home-quote cite { font-size:.82rem; color:var(--accent); font-style:normal; letter-spacing:.06em; }

    /* Hero wrapper relative for meta */
    .hero-wrap { position: relative; }

    /* Newsletter */
    .nl-section { text-align:center; padding:64px 0; border-top:1px solid rgba(255,255,255,.06); margin-top:20px; }
    .nl-heading { font-size:.7rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; text-shadow:0 0 10px rgba(0,212,255,.35); }
    .nl-heading::before { content:'// '; opacity:.55; }
    .nl-desc { color:var(--muted); font-size:.92rem; max-width:420px; margin:0 auto 24px; line-height:1.6; }
    .nl-form { display:flex; gap:10px; max-width:420px; margin:0 auto; }
    .nl-input {
      flex:1; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.09);
      border-radius:var(--radius); padding:13px 16px; color:var(--text); font-size:.9rem;
      font-family:inherit; outline:none; transition:border-color .2s;
    }
    .nl-input:focus { border-color:rgba(0,212,255,.45); }
    .nl-input::placeholder { color:rgba(241,245,249,.22); }
    .nl-btn {
      background:var(--accent); color:#050810; border:none; border-radius:var(--radius);
      padding:13px 22px; font-size:.85rem; font-weight:700; cursor:pointer;
      font-family:inherit; white-space:nowrap; transition:opacity .2s;
    }
    .nl-btn:hover { opacity:.85; }
    .nl-status { font-size:.85rem; margin-top:12px; }
    .nl-status.ok { color:#4ade80; }
    .nl-status.err { color:#f87171; }
    @media(max-width:768px){
      .hero{padding:100px 0 60px;}
      .home-quote{padding:24px;}
      .hero-meta{flex-wrap:wrap;gap:12px 16px;justify-content:center;}
      .hero-meta-sep{display:none;}
      .hero-meta-item{text-align:center;}
      .nl-form{flex-direction:column;}
    }
  </style>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Andrii Chepelovskyi",
    "alternateName": "Андрій Чепеловський",
    "url": "https://chepelovskyi.com",
    "image": "https://chepelovskyi.com/og-image.png",
    "description": "Акробат, мыслитель, наблюдатель. Украинец в Норвегии. 10+ лет на сцене, 5+ стран.",
    "nationality": "Ukrainian",
    "knowsAbout": ["Cognitive Psychology", "Philosophy of Language", "Artificial Intelligence", "Acrobatics", "Cross-cultural Sociology"],
    "knowsLanguage": ["ru", "uk", "no", "en"]
  }
  </script>
</head>
<body data-page="index">
  <noscript><style>.fade-in{opacity:1!important;transform:none!important}#page-overlay{display:none!important}</style></noscript>

  <!-- Transition overlay -->
  <div id="page-overlay"></div>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">A<span>.</span>C</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="about.html"     onclick="closeMenu()" data-i18n="nav_about">О себе</a></li>
      <li><a href="journey.html"   onclick="closeMenu()" data-i18n="nav_journey">Мой путь</a></li>
      <li><a href="interests.html" onclick="closeMenu()" data-i18n="nav_interests">Интересы</a></li>
      <li><a href="videos.html"    onclick="closeMenu()" data-i18n="nav_videos">Видео</a></li>
      <li><a href="contact.html"   onclick="closeMenu()" data-i18n="nav_contact">Контакт</a></li>
    </ul>
    <div class="nav-controls">
      <div class="lang-btns">
        <button class="lang-btn" data-lang="ru" onclick="switchLang('ru')">RU</button>
        <button class="lang-btn" data-lang="uk" onclick="switchLang('uk')">UK</button>
        <button class="lang-btn" data-lang="no" onclick="switchLang('no')">NO</button>
      </div>
      <div class="nav-sep"></div>
      <div class="theme-dots">
        <button class="theme-dot t-cyan"   data-theme="cyan"   onclick="switchTheme('cyan')"   title="Cyan"></button>
        <button class="theme-dot t-purple" data-theme="purple" onclick="switchTheme('purple')" title="Purple"></button>
        <button class="theme-dot t-green"  data-theme="green"  onclick="switchTheme('green')"  title="Green"></button>
        <button class="theme-dot t-orange" data-theme="orange" onclick="switchTheme('orange')" title="Orange"></button>
      </div>
    </div>
    <button class="burger" id="burger" onclick="toggleMenu()" aria-label="Меню">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="page-wrapper">
    <div class="container">

      <section class="hero fade-in">
        <div class="hero-badge"><span id="hero-badge-text"></span></div>
        <h1 class="hero-name">
          <span class="hero-name-line1">Andrii</span>
          <span class="hero-name-line2" data-glitch="Chepelovskyi">Chepelovskyi</span>
        </h1>
        <p class="hero-tagline" id="hero-tagline" data-typewriter></p>
        <p class="hero-sub" id="hero-sub"></p>
        <div class="hero-actions">
          <a id="btn-primary" href="journey.html" class="btn btn-primary"><span id="btn-primary-text"></span></a>
          <a id="btn-ghost"   href="about.html"   class="btn btn-ghost"><span id="btn-ghost-text"></span></a>
        </div>

        <!-- Quick stats — managed via admin -->
        <div class="hero-meta" id="hero-meta"></div>
      </section>

      <div class="section-sep fade-in"><span data-i18n="nav_section">Навигация</span></div>

      <div class="nav-cards" id="nav-cards"><!-- loader.js --></div>

      <div class="home-quote fade-in">
        <p id="home-quote-text"></p>
        <cite id="home-quote-author"></cite>
      </div>

      <!-- Newsletter — shown by loader.js when buttondownId is configured -->
      <div id="nl-wrap" style="display:none">
        <div class="nl-section fade-in">
          <div class="nl-heading">Подписаться</div>
          <p class="nl-desc">Редкие письма о мышлении, наблюдениях и том, что не помещается в пост.</p>
          <form class="nl-form" id="nl-form" onsubmit="submitNL(event)">
            <input class="nl-input" type="email" name="email" required placeholder="you@example.com" autocomplete="email" />
            <button class="nl-btn" type="submit" id="nl-btn">Подписаться</button>
          </form>
          <div class="nl-status" id="nl-status"></div>
        </div>
      </div>

    </div>
  </div>

  <footer></footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="site-data.js"></script>
  <script src="translations.js"></script>
  <script src="loader.js"></script>
  <script src="nav.js"></script>
  <script src="effects.js"></script>
  <script>
  function submitNL(e) {
    e.preventDefault();
    var form = document.getElementById('nl-form');
    var btn = document.getElementById('nl-btn');
    var stat = document.getElementById('nl-status');
    var email = form.querySelector('input[name="email"]').value;
    var bdId = form.dataset.bdid;
    if (!bdId) return;
    btn.disabled = true; btn.textContent = '...';
    stat.textContent = ''; stat.className = 'nl-status';
    fetch('https://buttondown.com/api/emails/embed-subscribe/' + bdId, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'email=' + encodeURIComponent(email)
    })
    .then(function() {
      stat.textContent = '✓ Проверь почту для подтверждения!';
      stat.className = 'nl-status ok';
      form.reset();
    })
    .catch(function() {
      stat.textContent = '✕ Ошибка — попробуй ещё раз';
      stat.className = 'nl-status err';
    })
    .finally(function() { btn.disabled = false; btn.textContent = 'Подписаться'; });
  }
  </script>
</body>
</html>
