  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── VARS (fallback for site theme) ── */
    :root { --card: var(--surface2, rgba(15,22,40,0.9)); }

    /* ── HERO ── */
    .int-hero-icon { font-size:3rem; display:block; margin-bottom:14px; filter:drop-shadow(0 0 16px rgba(0,212,255,0.5)); }

    /* ── TOOLBAR ── */
    .board-toolbar {
      display:flex; align-items:center; gap:12px; flex-wrap:wrap;
      margin-bottom:28px; padding:14px 18px;
      border-radius:var(--radius);
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.07);
    }
    .tag-filters { display:flex; gap:7px; flex-wrap:wrap; flex:1; min-width:0; }
    .tf-btn {
      background:transparent; border:1px solid rgba(255,255,255,0.12);
      color:var(--muted); border-radius:999px; padding:5px 13px;
      font-size:.78rem; cursor:pointer; transition:all var(--transition); font-family:inherit;
    }
    .tf-btn:hover { border-color:var(--accent); color:var(--accent); }
    .tf-btn.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }

    .toolbar-right { display:flex; align-items:center; gap:8px; flex-shrink:0; flex-wrap:wrap; }

    .sort-sel {
      background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12);
      color:var(--text); border-radius:8px; padding:6px 10px;
      font-size:.8rem; cursor:pointer; font-family:inherit;
    }
    .sort-sel option { background:#0d1117; }

    .view-toggle { display:flex; gap:3px; }
    .vt-btn {
      background:transparent; border:1px solid rgba(255,255,255,0.1);
      color:var(--muted); border-radius:6px; width:30px; height:30px;
      cursor:pointer; font-size:.85rem; display:flex; align-items:center; justify-content:center;
      transition:all var(--transition);
    }
    .vt-btn.active, .vt-btn:hover { border-color:var(--accent); color:var(--accent); }

    /* ── POSTS GRID ── */
    .posts-grid { columns:3; column-gap:16px; margin-bottom:80px; }
    .posts-grid.view-list { columns:1; }
    @media(max-width:1100px){ .posts-grid { columns:2; } }
    @media(max-width:600px)  { .posts-grid { columns:1; } }

    /* ── POST CARD ── */
    .post-card {
      break-inside:avoid; margin-bottom:16px;
      border-radius:var(--radius);
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.07);
      overflow:hidden;
      transition:transform var(--transition),border-color var(--transition),box-shadow var(--transition);
      position:relative;
    }
    .post-card:hover { transform:translateY(-3px); border-color:rgba(0,212,255,0.18); box-shadow:0 8px 32px rgba(0,0,0,0.25); }

    .post-type-bar { height:3px; width:100%; }
    .type-note  .post-type-bar { background:var(--accent); }
    .type-video .post-type-bar { background:#e74c3c; }
    .type-quote .post-type-bar { background:#9b59b6; }
    .type-link  .post-type-bar { background:#27ae60; }

    .post-body { padding:18px 20px 14px; }

    .post-header { display:flex; align-items:flex-start; gap:9px; margin-bottom:10px; }
    .post-type-icon { font-size:1rem; flex-shrink:0; margin-top:2px; }
    .post-title { font-size:.95rem; font-weight:700; line-height:1.3; color:var(--text); flex:1; text-decoration:none; }
    a.post-title:hover { color:var(--accent); }

    .post-content {
      font-size:.87rem; color:var(--muted); line-height:1.65;
      margin-bottom:12px; word-break:break-word;
    }
    /* Markdown elements inside .post-content */
    .post-content h1,.post-content h2,.post-content h3,.post-content h4 {
      color:var(--text); margin:12px 0 6px; line-height:1.3;
    }
    .post-content h1 { font-size:1.1rem; }
    .post-content h2 { font-size:1rem; }
    .post-content h3 { font-size:.95rem; }
    .post-content h4 { font-size:.9rem; }
    .post-content p   { margin:0 0 8px; }
    .post-content p:last-child { margin-bottom:0; }
    .post-content ul,.post-content ol { padding-left:20px; margin:6px 0; }
    .post-content li  { margin-bottom:3px; }
    .post-content a   { color:var(--accent); text-decoration:underline; text-underline-offset:2px; }
    .post-content a:hover { opacity:.8; }
    .post-content strong { color:var(--text); }
    .post-content code {
      background:rgba(0,212,255,.08); color:var(--accent);
      padding:1px 5px; border-radius:4px; font-size:.83em;
    }
    .post-content pre {
      background:rgba(0,0,0,.35); border:1px solid rgba(255,255,255,.07);
      border-radius:8px; padding:12px 14px; overflow-x:auto;
      margin:8px 0; font-size:.82rem; line-height:1.5;
    }
    .post-content pre code { background:transparent; padding:0; color:var(--text); }
    .post-content blockquote {
      border-left:3px solid var(--accent); padding-left:14px;
      color:var(--text); font-style:italic; margin:8px 0;
    }
    .post-content img { max-width:100%; border-radius:6px; margin:6px 0; }
    .post-content hr  { border:none; border-top:1px solid rgba(255,255,255,.08); margin:12px 0; }

    .post-quote-text {
      font-size:.98rem; color:var(--text); font-style:italic; line-height:1.6;
      border-left:3px solid var(--accent); padding-left:14px; margin-bottom:8px;
    }
    .post-quote-author { font-size:.78rem; color:var(--muted); margin-bottom:12px; }

    .post-link-url {
      display:inline-flex; align-items:center; gap:5px;
      font-size:.8rem; color:var(--accent); text-decoration:none;
      margin-bottom:10px; word-break:break-all;
    }
    .post-link-url:hover { text-decoration:underline; }

    /* Video thumb inside card */
    .post-video-thumb {
      width:100%; aspect-ratio:16/9; position:relative; cursor:pointer;
      margin-bottom:12px; border-radius:6px; overflow:hidden; background:#050810;
    }
    .post-video-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .post-video-play {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.38); transition:background var(--transition);
    }
    .post-video-thumb:hover .post-video-play { background:rgba(0,0,0,0.18); }
    .post-video-play-btn {
      width:46px; height:46px; border-radius:50%; background:var(--accent);
      display:flex; align-items:center; justify-content:center;
      color:#000; font-size:1.1rem;
      box-shadow:0 0 20px rgba(0,212,255,0.45);
    }

    .post-tags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
    .post-tag {
      font-size:.7rem; background:rgba(0,212,255,0.08); color:var(--accent);
      border-radius:999px; padding:3px 9px; cursor:pointer;
      transition:background var(--transition);
    }
    .post-tag:hover { background:rgba(0,212,255,0.16); }

    .post-footer {
      display:flex; align-items:center; justify-content:space-between;
      padding-top:10px; border-top:1px solid rgba(255,255,255,0.06);
    }
    .post-date { font-size:.7rem; color:var(--muted); opacity:.65; }

    /* ── SHARE BUTTON ── */
    .post-share {
      background:transparent; border:1px solid rgba(255,255,255,0.08);
      color:var(--muted); border-radius:6px; padding:4px 8px;
      font-size:.7rem; cursor:pointer; transition:all var(--transition); font-family:inherit;
      display:flex; align-items:center; gap:4px;
    }
    .post-share:hover { border-color:var(--accent); color:var(--accent); }
    .post-share.copied { border-color:#27ae60; color:#27ae60; }

    /* ── PIN BADGE ── */
    .post-pin {
      position:absolute; top:10px; right:10px; font-size:.75rem;
      background:rgba(0,212,255,0.12); color:var(--accent);
      border-radius:999px; padding:3px 8px; z-index:2;
      display:flex; align-items:center; gap:3px;
      font-weight:600; letter-spacing:.02em;
    }

    /* ── READ MORE ── */
    .post-content.collapsed { max-height:120px; overflow:hidden; position:relative; }
    .post-content.collapsed::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:40px;
      background:linear-gradient(transparent, rgba(15,22,40,0.95));
      pointer-events:none;
    }
    .post-readmore {
      background:transparent; border:none; color:var(--accent);
      font-size:.78rem; cursor:pointer; padding:4px 0; margin-top:4px;
      font-family:inherit; transition:opacity var(--transition);
    }
    .post-readmore:hover { opacity:.7; }

    /* ── SEARCH BAR ── */
    .board-search {
      width:100%; margin-bottom:16px;
      display:flex; align-items:center; gap:10px;
      background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12);
      border-radius:var(--radius); padding:12px 18px;
      transition:border-color var(--transition), box-shadow var(--transition);
    }
    .board-search:focus-within { border-color:var(--accent); box-shadow:0 0 16px rgba(0,212,255,0.12); }
    .board-search-icon { color:var(--accent); font-size:1.1rem; flex-shrink:0; }
    .board-search input {
      flex:1; background:transparent; border:none; outline:none;
      color:var(--text); font-size:.92rem; font-family:inherit;
    }
    .board-search input::placeholder { color:var(--muted); opacity:.7; }
    .board-search-clear {
      background:transparent; border:none; color:var(--muted);
      font-size:1.1rem; cursor:pointer; display:none; padding:0 4px;
      transition:color var(--transition);
    }
    .board-search-clear:hover { color:var(--accent); }
    .board-search-clear.vis { display:block; }

    /* ── POST COUNTER ── */
    .board-counter {
      font-size:.78rem; color:var(--muted); margin-bottom:16px;
      display:flex; align-items:center; gap:6px;
    }
    .board-counter-num { color:var(--accent); font-weight:700; }

    /* ── LOAD MORE BUTTON ── */
    .load-more-wrap { text-align:center; margin:8px 0 60px; }
    .load-more-btn {
      display:inline-flex; align-items:center; gap:8px;
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
      color:var(--text); border-radius:var(--radius); padding:12px 32px;
      font-size:.85rem; font-weight:600; cursor:pointer; font-family:inherit;
      transition:all var(--transition);
    }
    .load-more-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(0,212,255,0.05); }

    /* ── EMPTY STATE ── */
    .board-empty { text-align:center; padding:80px 20px; color:var(--muted); }
    .board-empty-icon { font-size:3rem; margin-bottom:20px; opacity:.3; display:block; }
    .board-empty h3 { font-size:1.05rem; font-weight:600; margin-bottom:10px; color:var(--text); opacity:.6; }
    .board-empty p  { font-size:.9rem; max-width:300px; margin:0 auto 24px; line-height:1.6; }

    /* ── GISCUS COMMENTS ── */
    .giscus-section {
      margin-top:56px; padding-top:48px;
      border-top:1px solid rgba(255,255,255,.06);
    }
    .giscus-heading {
      font-size:.7rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
      color:var(--accent); margin-bottom:24px;
      text-shadow:0 0 10px rgba(0,212,255,.35);
    }
    .giscus-heading::before { content:'// '; opacity:.55; }

    /* ── VIDEO PLAYER MODAL ── */
    .vmo {
      position:fixed; inset:0; background:rgba(0,0,0,0.92); backdrop-filter:blur(14px);
      z-index:1000; display:flex; align-items:center; justify-content:center;
      padding:20px; opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .vmo.open { opacity:1; pointer-events:all; }
    .vmo-inner { width:100%; max-width:880px; position:relative; }
    .vmo-close {
      position:absolute; top:-42px; right:0;
      background:transparent; border:none; color:rgba(255,255,255,.7);
      font-size:1.6rem; cursor:pointer; transition:color var(--transition);
    }
    .vmo-close:hover { color:#fff; }
    .vmo-player { width:100%; aspect-ratio:16/9; border-radius:12px; overflow:hidden; background:#000; }
    .vmo-player iframe, .vmo-player video { width:100%; height:100%; border:none; display:block; }

    @media(max-width:600px) {
      .board-toolbar { flex-direction:column; align-items:stretch; }
      .toolbar-right  { justify-content:space-between; }
    }
  </style>
</head>

  (function () {
    // Safe Firestore read — works even if Firebase not loaded
    async function safeGet(c,d){ if(typeof window.fsGet==='function'){try{return await window.fsGet(c,d);}catch(e){return null;}} return null; }

    /* ── SETUP ───────────────────────────────────── */
    const params     = new URLSearchParams(location.search);
    const interestId = params.get('id') || '';
    const STORE_KEY  = 'ac_board_' + interestId;

    let posts         = [];
    let currentFilter = 'all';
    let currentSort   = 'newest';
    let currentView   = 'grid';
    let searchQuery   = '';
    const PAGE_SIZE   = 12;
    let visibleCount  = PAGE_SIZE;

    /* ── INTEREST META ───────────────────────────── */
    async function getInterestCard() {
      const iconToId = {'🧠':'psychology','🌀':'philosophy','⚡':'tech','🌍':'sociology','🤸':'acrobatics','🚗':'cars'};
      let cards = (window.AC_DEFAULTS && window.AC_DEFAULTS.interests && window.AC_DEFAULTS.interests.cards) || [];
      try {
        const saved = await safeGet('content', 'ac_content');
        if (saved && saved.interests && saved.interests.cards) cards = saved.interests.cards;
      } catch(e) {}
      return cards.find(c => (c.id || iconToId[c.icon]) === interestId) || null;
    }

    async function renderHero() {
      const c = await getInterestCard();
      if (!c) {
        document.getElementById('int-icon').textContent  = '⚠️';
        document.getElementById('int-title').textContent = 'Интерес не найден';
        document.getElementById('int-desc').textContent  = 'Проверьте ссылку или вернитесь к списку интересов.';
        document.querySelector('.board-toolbar').style.display = 'none';
        return;
      }
      document.title = c.title + ' · Andrii Chepelovskyi';
      document.getElementById('int-icon').textContent  = c.icon;
      document.getElementById('int-title').textContent = c.title;
      document.getElementById('int-desc').textContent  = c.desc;
    }

    /* ── STORAGE (read-only, Firestore) ─────────── */
    async function loadPosts() {
      try {
        const doc = await safeGet('boards', interestId);
        posts = (doc && doc.posts) || [];
      } catch(e) { posts = []; }
    }

    /* ── HELPERS ─────────────────────────────────── */
    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    /** Render Markdown → sanitized HTML. Falls back to esc() if CDN libs not loaded. */
    function renderMd(text) {
      if (!text) return '';
      if (typeof marked !== 'undefined' && typeof DOMPurify !== 'undefined') {
        try { return DOMPurify.sanitize(marked.parse(text)); } catch(e) {}
      }
      return esc(text);
    }
    function typeIcon(t) {
      return {note:'📝', video:'🎬', quote:'💬', link:'🔗'}[t] || '📝';
    }
    function fmtDate(ts) {
      return new Date(ts).toLocaleDateString('ru-RU', {day:'numeric', month:'short', year:'numeric'});
    }
    function getThumb(p) {
      if (p.thumb) return p.thumb;
      if (p.videoType === 'youtube' && p.videoId)
        return 'https://img.youtube.com/vi/' + p.videoId + '/hqdefault.jpg';
      return '';
    }

    /* ── TAG FILTER BAR ──────────────────────────── */
    function buildTagFilters() {
      const allTags = new Set();
      posts.filter(p => p.published !== false).forEach(p => (p.tags||[]).forEach(t => allTags.add(t)));
      const container = document.getElementById('tag-filters');
      const allBtn = `<button class="tf-btn ${currentFilter==='all'?'active':''}" onclick="filterByTag('all',this)">Все</button>`;
      const tagBtns = [...allTags].map(t => {
        const safe = t.replace(/'/g,"\\'");
        return `<button class="tf-btn ${currentFilter===t?'active':''}" onclick="filterByTag('${safe}',this)">${esc(t)}</button>`;
      }).join('');
      container.innerHTML = allBtn + tagBtns;
    }

    /* ── SORT + FILTER + SEARCH ──────────────────── */
    function getSortedFiltered() {
      let list = posts.filter(p => p.published !== false);
      if (currentFilter !== 'all') list = list.filter(p => (p.tags||[]).includes(currentFilter));
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        list = list.filter(p =>
          (p.title||'').toLowerCase().includes(q) ||
          (p.content||'').toLowerCase().includes(q) ||
          (p.author||'').toLowerCase().includes(q) ||
          (p.tags||[]).some(t => t.toLowerCase().includes(q))
        );
      }
      // Pinned posts always first
      list.sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0));
      // Then by selected sort
      const ord = {note:0, video:1, quote:2, link:3};
      const unpinSort = (a,b) => {
        if (a.pinned && b.pinned) return b.id - a.id;
        if (a.pinned || b.pinned) return 0;
        if      (currentSort === 'newest') return b.id - a.id;
        else if (currentSort === 'oldest') return a.id - b.id;
        else if (currentSort === 'type')   return (ord[a.type]||0) - (ord[b.type]||0);
        return 0;
      };
      list.sort(unpinSort);
      return list;
    }

    /* ── RENDER POSTS ────────────────────────────── */
    function updateCounter(shown, total) {
      const el = document.getElementById('board-counter');
      if (!total) { el.innerHTML = ''; return; }
      const word = declOfNum(total, ['запись','записи','записей']);
      el.innerHTML = `<span class="board-counter-num">${shown}</span> из <span class="board-counter-num">${total}</span> ${word}`;
    }
    function declOfNum(n, titles) {
      const c = [2,0,1,1,1,2];
      return titles[(n%100>4 && n%100<20) ? 2 : c[(n%10<5)?n%10:5]];
    }

    function renderPosts() {
      buildTagFilters();
      const grid  = document.getElementById('posts-grid');
      const empty = document.getElementById('board-empty');
      const lm    = document.getElementById('load-more-wrap');
      const list  = getSortedFiltered();

      grid.className = 'posts-grid' + (currentView === 'list' ? ' view-list' : '');

      if (!posts.filter(p => p.published !== false).length) {
        grid.innerHTML = '';
        empty.style.display = '';
        lm.style.display = 'none';
        updateCounter(0, 0);
        return;
      }
      empty.style.display = 'none';

      if (!list.length) {
        grid.innerHTML = `<p style="color:var(--muted);padding:40px 0;text-align:center">${searchQuery ? 'Ничего не найдено.' : 'Ничего по этому тегу.'}</p>`;
        lm.style.display = 'none';
        updateCounter(0, 0);
        return;
      }

      const visible = list.slice(0, visibleCount);
      grid.innerHTML = visible.map(renderCard).join('');

      // Show/hide load more
      lm.style.display = list.length > visibleCount ? '' : 'none';

      updateCounter(visible.length, list.length);

      // Observe for scroll animations
      setTimeout(() => {
        if (window.acObs) grid.querySelectorAll('.fade-in:not(.visible)').forEach(el => window.acObs.observe(el));
      }, 60);

      // Collapse long content + link to full page
      grid.querySelectorAll('.post-content').forEach(el => {
        if (el.scrollHeight > 160) {
          el.classList.add('collapsed');
          const postId = el.closest('.post-card')?.dataset.id;
          const link = document.createElement('a');
          link.className = 'post-readmore';
          link.textContent = 'Читать далее →';
          link.href = 'post.html?board=' + encodeURIComponent(interestId) + '&post=' + postId;
          link.target = '_blank';
          link.rel = 'noopener';
          el.parentElement.insertBefore(link, el.nextSibling);
        }
      });
    }

    function postUrl(p) {
      return 'post.html?board=' + encodeURIComponent(interestId) + '&post=' + p.id;
    }

    function renderCard(p) {
      const tagsHtml = (p.tags||[]).length
        ? `<div class="post-tags">${p.tags.map(t => `<span class="post-tag" onclick="filterByTagName('${esc(t)}')">#${esc(t)}</span>`).join('')}</div>`
        : '';

      let body = '';
      const link = postUrl(p);

      if (p.type === 'note') {
        if (p.title)   body += `<div class="post-header"><span class="post-type-icon">${typeIcon('note')}</span><a class="post-title" href="${link}" target="_blank" rel="noopener">${esc(p.title)}</a></div>`;
        if (p.content) body += `<div class="post-content">${renderMd(p.content)}</div>`;

      } else if (p.type === 'video') {
        if (p.title) body += `<div class="post-header"><span class="post-type-icon">${typeIcon('video')}</span><a class="post-title" href="${link}" target="_blank" rel="noopener">${esc(p.title)}</a></div>`;
        const th = getThumb(p);
        if (th) body += `<div class="post-video-thumb" onclick="playVideo(${p.id})">
          <img src="${esc(th)}" alt="${esc(p.title||'')}" loading="lazy"
               onerror="this.parentElement.style.display='none'">
          <div class="post-video-play"><div class="post-video-play-btn">▶</div></div>
        </div>`;
        if (p.content) body += `<div class="post-content">${renderMd(p.content)}</div>`;

      } else if (p.type === 'quote') {
        body += `<div class="post-quote-text">${esc(p.content||'')}</div>`;
        if (p.author) body += `<div class="post-quote-author">— ${esc(p.author)}</div>`;

      } else if (p.type === 'link') {
        if (p.title) body += `<div class="post-header"><span class="post-type-icon">${typeIcon('link')}</span><a class="post-title" href="${link}" target="_blank" rel="noopener">${esc(p.title)}</a></div>`;
        if (p.url)   body += `<a class="post-link-url" href="${esc(p.url)}" target="_blank" rel="noopener">🔗 ${esc(p.url)}</a>`;
        if (p.content) body += `<div class="post-content">${renderMd(p.content)}</div>`;
      }

      const pinHtml = p.pinned ? `<div class="post-pin">📌 Закреплено</div>` : '';

      return `<div class="post-card type-${p.type} fade-in" data-id="${p.id}">
        ${pinHtml}
        <div class="post-type-bar"></div>
        <div class="post-body">
          ${body}
          ${tagsHtml}
          <div class="post-footer">
            <div class="post-date">${fmtDate(p.id)}</div>
            <button class="post-share" onclick="sharePost(${p.id},this)" title="Поделиться">📋 Ссылка</button>
          </div>
        </div>
      </div>`;
    }

    /* ── SEARCH ──────────────────────────────────── */
    function onSearch(val) {
      searchQuery = (val||'').trim();
      visibleCount = PAGE_SIZE;
      document.getElementById('search-clear').classList.toggle('vis', !!searchQuery);
      renderPosts();
    }
    function clearSearch() {
      document.getElementById('search-input').value = '';
      onSearch('');
    }

    /* ── LOAD MORE ───────────────────────────────── */
    function loadMore() {
      visibleCount += PAGE_SIZE;
      renderPosts();
    }

    /* ── SHARE POST ──────────────────────────────── */
    function sharePost(id, btn) {
      const url = location.origin + location.pathname + '?id=' + interestId + '#post-' + id;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(() => showCopied(btn)).catch(() => fallbackCopy(url, btn));
      } else {
        fallbackCopy(url, btn);
      }
    }
    function fallbackCopy(text, btn) {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); showCopied(btn); } catch(e) {}
      document.body.removeChild(ta);
    }
    function showCopied(btn) {
      btn.classList.add('copied');
      btn.innerHTML = '✓ Скопировано';
      setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '📋 Ссылка'; }, 2000);
    }

    /* ── FILTER / SORT / VIEW ────────────────────── */
    function filterByTag(tag, btn) {
      currentFilter = tag;
      visibleCount = PAGE_SIZE;
      document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      renderPosts();
    }

    function filterByTagName(tag) {
      currentFilter = tag;
      visibleCount = PAGE_SIZE;
      buildTagFilters();
      renderPosts();
    }

    function resort() { currentSort = document.getElementById('sort-sel').value; renderPosts(); }

    function setView(v) {
      currentView = v;
      document.getElementById('vt-grid').classList.toggle('active', v==='grid');
      document.getElementById('vt-list').classList.toggle('active', v==='list');
      renderPosts();
    }

    /* ── VIDEO PLAYER ────────────────────────────── */
    const VMO = document.getElementById('vmo');

    function playVideo(id) {
      const p = posts.find(x => x.id === id);
      if (!p) return;
      const pl = document.getElementById('vmo-player');
      if (p.videoType === 'youtube') {
        pl.innerHTML = `<iframe src="https://www.youtube.com/embed/${p.videoId}?autoplay=1&rel=0" allowfullscreen allow="autoplay"></iframe>`;
      } else if (p.videoType === 'vimeo') {
        pl.innerHTML = `<iframe src="https://player.vimeo.com/video/${p.videoId}?autoplay=1&color=00d4ff" allowfullscreen allow="autoplay"></iframe>`;
      } else {
        pl.innerHTML = `<video controls autoplay src="${esc(p.videoId)}"></video>`;
      }
      VMO.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeVidModal() {
      document.getElementById('vmo-player').innerHTML = '';
      VMO.classList.remove('open');
      document.body.style.overflow = '';
    }

    function vmoClick(e) { if (e.target === VMO) closeVidModal(); }

    /* ── KEYBOARD ────────────────────────────────── */
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && VMO.classList.contains('open')) closeVidModal();
    });

    /* ── EXPOSE GLOBALS ──────────────────────────── */
    window.filterByTag     = filterByTag;
    window.filterByTagName = filterByTagName;
    window.resort          = resort;
    window.setView         = setView;
    window.playVideo       = playVideo;
    window.closeVidModal   = closeVidModal;
    window.vmoClick        = vmoClick;
    window.onSearch        = onSearch;
    window.clearSearch     = clearSearch;
    window.loadMore        = loadMore;
    window.sharePost       = sharePost;

    /* ── GISCUS INJECTION ────────────────────────── */
    async function injectGiscus() {
      const wrap = document.getElementById('giscus-wrap');
      if (!wrap) return;
      try {
        let g = window.AC_DEFAULTS && window.AC_DEFAULTS.global && window.AC_DEFAULTS.global.giscus;
        try {
          const saved = await safeGet('content', 'ac_content');
          if (saved && saved.global && saved.global.giscus) g = Object.assign({}, g, saved.global.giscus);
        } catch(e) {}
        if (!g || !g.repo || !g.repo.trim()) return;
        wrap.style.display = '';
        const s = document.createElement('script');
        s.src = 'https://giscus.app/client.js';
        s.setAttribute('data-repo',        g.repo.trim());
        s.setAttribute('data-repo-id',     (g.repoId||'').trim());
        s.setAttribute('data-category',    (g.category||'General').trim());
        s.setAttribute('data-category-id', (g.categoryId||'').trim());
        s.setAttribute('data-mapping',     'url');
        s.setAttribute('data-strict',      '0');
        s.setAttribute('data-reactions-enabled', '1');
        s.setAttribute('data-emit-metadata','0');
        s.setAttribute('data-input-position','top');
        s.setAttribute('data-theme',       'dark_dimmed');
        s.setAttribute('data-lang',        localStorage.getItem('ac_lang') || 'ru');
        s.setAttribute('crossorigin',      'anonymous');
        s.async = true;
        wrap.querySelector('.giscus').appendChild(s);
      } catch(e) {}
    }

    /* ── INIT ────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', async () => {
      await renderHero();
      await loadPosts();
      renderPosts();
      await injectGiscus();
    });

  })();
  </script>
</body>
