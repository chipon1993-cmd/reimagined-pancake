  <style>
    .about-grid { display:grid; grid-template-columns:1fr 1fr; gap:64px; align-items:start; margin-bottom:72px; }
    #about-paragraphs p { color:var(--muted); margin-bottom:18px; font-size:1.02rem; }
    #about-paragraphs p b { color:var(--text); }
    #about-stats { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .stat-card { border-radius:var(--radius); padding:24px; transition:var(--transition); }
    .stat-card .num { font-size:2.4rem; font-weight:900; line-height:1; }
    .stat-card .lbl { font-size:.78rem; color:var(--muted); margin-top:6px; letter-spacing:.06em; text-transform:uppercase; }
    .values-title { font-size:1rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:20px; text-shadow:0 0 10px rgba(0,212,255,0.4); }
    #about-values { display:flex; flex-direction:column; gap:12px; margin-bottom:72px; }
    .value-item { display:flex; align-items:flex-start; gap:16px; border-radius:var(--radius); padding:20px 24px; transition:var(--transition); }
    .value-icon { font-size:1.5rem; flex-shrink:0; filter:drop-shadow(0 0 6px rgba(0,212,255,0.4)); display:flex; align-items:center; }
    .value-icon svg { width:24px; height:24px; stroke:var(--accent); stroke-width:1.75; fill:none; }
    .value-text h4 { font-size:.95rem; font-weight:700; margin-bottom:4px; letter-spacing:.04em; }
    .value-text p { font-size:.88rem; color:var(--muted); }
    @media(max-width:768px){ .about-grid{grid-template-columns:1fr;gap:40px;} }
  </style>
</head>

        <div id="about-paragraphs" class="fade-in"></div>
