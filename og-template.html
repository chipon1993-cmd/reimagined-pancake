<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    width:1200px; height:630px; overflow:hidden;
    background:#050810;
    font-family:'Inter','Segoe UI',system-ui,sans-serif;
    color:#f1f5f9;
    position:relative;
  }

  /* Grid */
  .grid{
    position:absolute; inset:0; z-index:0;
    background-image:
      linear-gradient(rgba(0,212,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.05) 1px, transparent 1px);
    background-size:48px 48px;
  }

  /* Radial vignette */
  .vignette{
    position:absolute; inset:0; z-index:1;
    background:radial-gradient(ellipse at 60% 50%, transparent 30%, rgba(5,8,16,0.75) 100%);
  }

  /* Glow spots */
  .glow-cyan{
    position:absolute; z-index:1;
    width:480px; height:480px;
    background:radial-gradient(circle, rgba(0,212,255,0.10) 0%, transparent 70%);
    top:-100px; left:-80px;
  }
  .glow-purple{
    position:absolute; z-index:1;
    width:400px; height:400px;
    background:radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 70%);
    bottom:-80px; right:100px;
  }

  /* Content */
  .content{
    position:relative; z-index:2;
    height:100%; padding:64px 72px;
    display:flex; flex-direction:column; justify-content:space-between;
  }

  /* Top row */
  .top{
    display:flex; align-items:center; justify-content:space-between;
  }
  .site-tag{
    font-size:13px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
    color:rgba(0,212,255,0.7);
  }
  .site-tag::before{ content:'// '; opacity:.6; }

  .location-pill{
    display:flex; align-items:center; gap:8px;
    background:rgba(0,212,255,0.07);
    border:1px solid rgba(0,212,255,0.18);
    border-radius:999px; padding:6px 18px;
    font-size:13px; font-weight:600; letter-spacing:.06em;
    color:rgba(0,212,255,0.75);
  }
  .dot{
    width:7px; height:7px; border-radius:50%;
    background:#00d4ff;
    box-shadow:0 0 8px #00d4ff;
  }

  /* Main */
  .main{ flex:1; display:flex; flex-direction:column; justify-content:center; padding:16px 0; }

  .name{
    font-size:72px; font-weight:900; letter-spacing:-.03em;
    line-height:1; margin-bottom:28px;
  }
  .name span{ color:#00d4ff; text-shadow:0 0 40px rgba(0,212,255,0.4); }

  .tagline{
    font-size:22px; font-weight:400; line-height:1.55;
    color:rgba(241,245,249,0.65);
    max-width:720px;
  }
  .tagline strong{ color:rgba(241,245,249,0.9); font-weight:600; }

  /* Stats row */
  .stats{
    display:flex; align-items:center; gap:40px;
  }
  .stat{ display:flex; flex-direction:column; gap:4px; }
  .stat-num{
    font-size:28px; font-weight:900; letter-spacing:-.02em;
    color:#00d4ff;
  }
  .stat-lbl{
    font-size:12px; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
    color:rgba(241,245,249,0.4);
  }
  .stat-sep{
    width:1px; height:40px;
    background:rgba(0,212,255,0.15);
  }

  /* Bottom */
  .bottom{
    display:flex; align-items:flex-end; justify-content:space-between;
  }
  .tags{ display:flex; gap:10px; }
  .tag{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:6px; padding:6px 14px;
    font-size:13px; font-weight:500; letter-spacing:.04em;
    color:rgba(241,245,249,0.5);
  }
  .url{
    font-size:14px; font-weight:600; letter-spacing:.12em;
    text-transform:uppercase; color:rgba(0,212,255,0.5);
  }

  /* Corner brackets */
  .corner{ position:absolute; z-index:3; width:24px; height:24px; border-color:rgba(0,212,255,0.25); border-style:solid; }
  .corner.tl{ top:20px; left:20px;  border-width:2px 0 0 2px; }
  .corner.tr{ top:20px; right:20px; border-width:2px 2px 0 0; }
  .corner.bl{ bottom:20px; left:20px;  border-width:0 0 2px 2px; }
  .corner.br{ bottom:20px; right:20px; border-width:0 2px 2px 0; }
</style>
</head>
<body>
<div class="grid"></div>
<div class="vignette"></div>
<div class="glow-cyan"></div>
<div class="glow-purple"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="content">

  <div class="top">
    <div class="site-tag">Personal site</div>
    <div class="location-pill">
      <div class="dot"></div>
      Украина → Норвегия · В процессе
    </div>
  </div>

  <div class="main">
    <div class="name">Andrii<br><span>Chepelovskyi</span></div>
    <div class="tagline">
      <strong>Акробат. Мыслитель. Наблюдатель.</strong><br>
      Делал то, чего не ожидали. Это дорого стоило.<br>
      И дало больше, чем просил.
    </div>
  </div>

  <div class="bottom">
    <div class="stats">
      <div class="stat">
        <div class="stat-num">10+</div>
        <div class="stat-lbl">лет на сцене</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <div class="stat-num">5+</div>
        <div class="stat-lbl">стран</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <div class="stat-num">∞</div>
        <div class="stat-lbl">вопросов</div>
      </div>
    </div>

    <div class="tags">
      <div class="tag">🧠 Психология</div>
      <div class="tag">🌀 Философия</div>
      <div class="tag">🤸 Акробатика</div>
    </div>
  </div>

</div>
</body>
</html>
