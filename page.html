  <style>
    /* Block styles for dynamic pages */
    .block-text { color:var(--muted); font-size:1.02rem; line-height:1.8; margin-bottom:32px; }
    .block-text b, .block-text strong { color:var(--text); }

    .block-quote {
      border-radius:var(--radius); padding:32px 40px; margin-bottom:32px;
      background:var(--surface); border:1px solid var(--border);
      -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px);
    }
    .block-quote p { font-size:1.1rem; font-style:italic; color:var(--text); line-height:1.8; margin-bottom:10px; }
    .block-quote cite { font-size:.82rem; color:var(--accent); font-style:normal; letter-spacing:.04em; }

    .block-heading { font-size:1.4rem; font-weight:800; letter-spacing:-.02em; margin-bottom:20px; margin-top:48px; }

    .block-divider { height:1px; background:var(--border); margin:48px 0; }

    .block-image { margin-bottom:32px; border-radius:var(--radius); overflow:hidden; }
    .block-image img { width:100%; display:block; }
    .block-image figcaption { font-size:.82rem; color:var(--muted); padding:12px 0 0; text-align:center; }

    .block-list { color:var(--muted); font-size:.95rem; line-height:1.8; margin-bottom:32px; padding-left:20px; }
    .block-list li { margin-bottom:8px; }
    .block-list li::marker { color:var(--accent); }

    .block-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin-bottom:32px; }
    .block-stats .stat-card { border-radius:var(--radius); padding:24px; background:var(--surface); border:1px solid var(--border); }
    .block-stats .stat-num { font-size:2rem; font-weight:900; color:var(--accent); line-height:1; }
    .block-stats .stat-lbl { font-size:.75rem; color:var(--muted); margin-top:6px; letter-spacing:.06em; text-transform:uppercase; }

    .block-callout {
      border-radius:var(--radius); padding:24px 28px; margin-bottom:32px;
      border-left:3px solid var(--accent);
      background:rgba(10,208,255,0.04);
    }
    .block-callout p { color:var(--muted); font-size:.95rem; line-height:1.7; }

    .page-empty {
      text-align:center; padding:80px 0;
      color:var(--muted); font-size:.9rem; opacity:.5;
    }
    .sub-pages { margin-top:48px; padding-top:32px; border-top:1px solid var(--border); }
    .sub-pages-title { font-size:.8rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:16px; font-weight:600; }
    .sub-pages-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
    .sub-page-card {
      display:flex; flex-direction:column; gap:6px;
      padding:18px 20px; border-radius:12px;
      background:var(--card-bg,rgba(255,255,255,0.03));
      border:1px solid var(--border);
      text-decoration:none; color:var(--text);
      transition:all .2s;
    }
    .sub-page-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.2); }
    .sub-page-name { font-weight:600; font-size:.95rem; }
    .sub-page-desc { font-size:.8rem; color:var(--muted); line-height:1.4; }
  </style>
</head>
