  <style>
    .timeline { position:relative; padding-left:36px; margin-bottom:80px; }
    .timeline::before { content:''; position:absolute; left:0; top:8px; bottom:8px; width:2px; border-radius:2px; }
    .timeline-item { position:relative; margin-bottom:52px; }
    .timeline-item::before { content:''; position:absolute; left:-43px; top:8px; width:14px; height:14px; border-radius:50%; background:var(--bg); border:2px solid; transition:background var(--transition),box-shadow var(--transition); }
    .timeline-header { display:flex; align-items:baseline; gap:14px; margin-bottom:10px; flex-wrap:wrap; }
    .timeline-year { font-size:.72rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase; border-radius:999px; padding:3px 12px; white-space:nowrap; }
    .timeline-title { font-size:1.1rem; font-weight:700; letter-spacing:.02em; }
    .timeline-location { font-size:.82rem; color:var(--muted); }
    .timeline-desc { font-size:.93rem; color:var(--muted); max-width:620px; margin-top:6px; line-height:1.7; }
    .timeline-tags { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    .tag { font-size:.72rem; border-radius:999px; padding:3px 12px; }
    .now-block { border-radius:var(--radius); padding:32px 36px; display:flex; align-items:flex-start; gap:20px; margin-bottom:80px; }
    .now-icon { font-size:2rem; flex-shrink:0; filter:drop-shadow(0 0 8px rgba(168,85,247,0.6)); }
    .now-text h3 { font-size:1rem; font-weight:700; margin-bottom:6px; letter-spacing:.08em; text-transform:uppercase; }
    .now-text p { font-size:.93rem; color:var(--muted); }
    @media(max-width:768px){ .now-block{flex-direction:column;padding:24px;} }
  </style>
</head>
