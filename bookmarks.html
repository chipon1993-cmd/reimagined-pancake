  <style>
    .bm-search {
      width: 100%; padding: 14px 20px; margin-bottom: 32px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 1rem;
      outline: none; transition: var(--transition);
    }
    .bm-search:focus { border-color: var(--accent); box-shadow: var(--glow); }
    .bm-search::placeholder { color: var(--muted); }

    .bm-stats {
      display: flex; gap: 24px; margin-bottom: 32px; flex-wrap: wrap;
    }
    .bm-stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 24px;
      font-size: .85rem; color: var(--muted);
    }
    .bm-stat strong { color: var(--accent); font-size: 1.3rem; display: block; margin-bottom: 4px; }

    .bm-folder {
      margin-bottom: 24px;
    }
    .bm-folder-header {
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      padding: 14px 20px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      transition: var(--transition); user-select: none;
    }
    .bm-folder-header:hover { border-color: var(--border-h); }
    .bm-folder-header .arrow {
      transition: transform 0.3s; font-size: .8rem; color: var(--muted);
    }
    .bm-folder-header.open .arrow { transform: rotate(90deg); }
    .bm-folder-title { font-weight: 700; font-size: 1rem; }
    .bm-folder-count { color: var(--muted); font-size: .8rem; margin-left: auto; }

    .bm-folder-body {
      display: none; padding: 8px 0 0 20px;
    }
    .bm-folder-body.open { display: block; }

    .bm-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; border-radius: 10px;
      transition: var(--transition);
    }
    .bm-item:hover { background: var(--surface); }
    .bm-item-icon {
      width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0;
      background: var(--surface2); display: flex; align-items: center;
      justify-content: center; font-size: .7rem; color: var(--accent);
    }
    .bm-item-icon img { width: 16px; height: 16px; border-radius: 2px; }
    .bm-item a {
      color: var(--text); text-decoration: none; font-size: .92rem;
      transition: color 0.2s;
    }
    .bm-item a:hover { color: var(--accent); }
    .bm-item-url {
      color: var(--muted); font-size: .75rem; margin-left: auto;
      max-width: 200px; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bm-empty {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .bm-empty h3 { color: var(--text); margin-bottom: 12px; }
    .bm-empty code {
      display: inline-block; margin-top: 16px; padding: 10px 20px;
      background: var(--surface); border-radius: 8px; font-size: .9rem;
      color: var(--accent);
    }

    @media(max-width:768px) {
      .bm-item-url { display: none; }
    }
  </style>
</head>
<body data-page="bookmarks">
  <noscript><style>.fade-in{opacity:1!important;transform:none!important}#page-overlay{display:none!important}</style></noscript>
  <div id="page-overlay"></div>
  <nav>
    <a href="index.html" class="nav-logo">A<span>.</span>C</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="about.html"     onclick="closeMenu()" data-i18n="nav_about">О себе</a></li>
      <li><a href="journey.html"   onclick="closeMenu()" data-i18n="nav_journey">Мой путь</a></li>
      <li><a href="interests.html" onclick="closeMenu()" data-i18n="nav_interests">Интересы</a></li>
      <li><a href="videos.html"    onclick="closeMenu()" data-i18n="nav_videos">Видео</a></li>
      <li><a href="contact.html"   onclick="closeMenu()" data-i18n="nav_contact">Контакт</a></li>
    </ul>
    <div class="nav-controls">
      <div class="lang-btns">
        <button class="lang-btn" data-lang="ru" onclick="switchLang('ru')">RU</button>
        <button class="lang-btn" data-lang="uk" onclick="switchLang('uk')">UK</button>
        <button class="lang-btn" data-lang="no" onclick="switchLang('no')">NO</button>
      </div>
      <div class="nav-sep"></div>
      <div class="theme-dots">
        <button class="theme-dot t-cyan"   data-theme="cyan"   onclick="switchTheme('cyan')"   title="Cyan"></button>
        <button class="theme-dot t-purple" data-theme="purple" onclick="switchTheme('purple')" title="Purple"></button>
        <button class="theme-dot t-green"  data-theme="green"  onclick="switchTheme('green')"  title="Green"></button>
        <button class="theme-dot t-orange" data-theme="orange" onclick="switchTheme('orange')" title="Orange"></button>
      </div>
    </div>
    <button class="burger" id="burger" onclick="toggleMenu()" aria-label="Меню">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="page-wrapper">
    <div class="container">
      <div class="page-hero fade-in">
        <a href="index.html" class="back-link" data-i18n="back_home">&larr; На главную</a>
        <p class="section-label">Ресурсы</p>
        <h1 class="section-title">Закладки Firefox</h1>
        <p class="section-desc">Все сайты и ресурсы, связанные с проектом — в одном месте. Экспортируй закладки из Firefox скриптом export-bookmarks.py.</p>
      </div>

      <div id="bm-stats" class="bm-stats fade-in"></div>
      <input type="text" class="bm-search fade-in" id="bm-search" placeholder="Поиск по закладкам..." />
      <div id="bm-container" class="fade-in"></div>
    </div>
  </div>

  <footer></footer>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="site-data.js"></script>
  <script src="translations.js"></script>
  <script src="loader.js"></script>
  <script src="nav.js"></script>
  <script src="effects.js"></script>
  <script>
  (function () {
    const container = document.getElementById('bm-container');
    const statsEl = document.getElementById('bm-stats');
    const searchInput = document.getElementById('bm-search');

    fetch('bookmarks.json')
      .then(r => r.json())
      .then(data => render(data))
      .catch(() => {
        container.innerHTML = `
          <div class="bm-empty">
            <h3>Закладки пока не загружены</h3>
            <p>Запусти скрипт на своём компьютере:</p>
            <code>python3 export-bookmarks.py</code>
            <p style="margin-top:12px">Затем закоммить bookmarks.json в репозиторий.</p>
          </div>`;
      });

    function render(data) {
      const bookmarks = data.bookmarks || [];
      const allItems = flattenBookmarks(bookmarks);
      const totalBookmarks = allItems.filter(b => b.type === 'bookmark').length;
      const totalFolders = allItems.filter(b => b.type === 'folder').length;

      // Stats
      statsEl.innerHTML = `
        <div class="bm-stat"><strong>${totalBookmarks}</strong>закладок</div>
        <div class="bm-stat"><strong>${totalFolders}</strong>папок</div>
        <div class="bm-stat"><strong>${data.source || 'Firefox'}</strong>источник</div>
        <div class="bm-stat"><strong>${data.exportDate ? new Date(data.exportDate).toLocaleDateString('ru') : '—'}</strong>экспорт</div>
      `;

      renderTree(bookmarks, container);

      // Search
      searchInput.addEventListener('input', function () {
        const q = this.value.toLowerCase().trim();
        if (!q) {
          renderTree(bookmarks, container);
          return;
        }
        const filtered = filterBookmarks(bookmarks, q);
        renderTree(filtered, container, true);
      });
    }

    function renderTree(nodes, parent, allOpen) {
      parent.innerHTML = '';
      nodes.forEach(node => {
        if (node.type === 'folder') {
          renderFolder(node, parent, allOpen);
        } else if (node.type === 'bookmark' && node.url) {
          renderBookmark(node, parent);
        }
      });
      if (!parent.children.length) {
        parent.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">Ничего не найдено</p>';
      }
    }

    function renderFolder(folder, parent, allOpen) {
      const children = folder.children || [];
      if (!children.length) return;

      const count = countBookmarks(folder);
      if (count === 0) return;

      const div = document.createElement('div');
      div.className = 'bm-folder';

      const header = document.createElement('div');
      header.className = 'bm-folder-header' + (allOpen ? ' open' : '');
      header.innerHTML = `
        <span class="arrow">&#9654;</span>
        <span class="bm-folder-title">${esc(folder.title || 'Без названия')}</span>
        <span class="bm-folder-count">${count}</span>
      `;

      const body = document.createElement('div');
      body.className = 'bm-folder-body' + (allOpen ? ' open' : '');

      header.addEventListener('click', () => {
        header.classList.toggle('open');
        body.classList.toggle('open');
      });

      children.forEach(child => {
        if (child.type === 'folder') renderFolder(child, body, allOpen);
        else if (child.type === 'bookmark' && child.url) renderBookmark(child, body);
      });

      div.appendChild(header);
      div.appendChild(body);
      parent.appendChild(div);
    }

    function renderBookmark(bm, parent) {
      const div = document.createElement('div');
      div.className = 'bm-item';
      const domain = getDomain(bm.url);
      div.innerHTML = `
        <div class="bm-item-icon"><img src="https://www.google.com/s2/favicons?domain=${esc(domain)}&sz=32" alt="" onerror="this.parentElement.textContent='🔗'" /></div>
        <a href="${esc(bm.url)}" target="_blank" rel="noopener">${esc(bm.title || bm.url)}</a>
        <span class="bm-item-url">${esc(domain)}</span>
      `;
      parent.appendChild(div);
    }

    function flattenBookmarks(nodes) {
      const result = [];
      nodes.forEach(n => {
        result.push(n);
        if (n.children) result.push(...flattenBookmarks(n.children));
      });
      return result;
    }

    function countBookmarks(folder) {
      let c = 0;
      (folder.children || []).forEach(n => {
        if (n.type === 'bookmark' && n.url) c++;
        if (n.type === 'folder') c += countBookmarks(n);
      });
      return c;
    }

    function filterBookmarks(nodes, q) {
      return nodes.map(n => {
        if (n.type === 'folder') {
          const filtered = filterBookmarks(n.children || [], q);
          if (filtered.length) return { ...n, children: filtered };
          return null;
        }
        if (n.type === 'bookmark') {
          const text = ((n.title || '') + ' ' + (n.url || '')).toLowerCase();
          return text.includes(q) ? n : null;
        }
        return null;
      }).filter(Boolean);
    }

    function getDomain(url) {
      try { return new URL(url).hostname; } catch { return url; }
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  })();
  </script>
</body>
