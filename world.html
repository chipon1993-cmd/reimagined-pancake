      font-size: clamp(1.2rem, 3vw, 1.6rem);

      position: absolute; bottom: 30px; left: 50%;
      transform: translateX(-50%);

      pointer-events: none;
      animation: hintPulse 3s ease-in-out infinite;

    .sphere-label-icon { font-size: 1.4rem; margin-bottom: 4px; display: block; }

    [data-theme="light"] .sphere-label {
      background: rgba(255,255,255,0.9);
      border-color: rgba(0,0,0,0.08);

    /* Loading */
    .world-loading {
      position: fixed; inset: 0; z-index: 20;
      background: var(--bg, #050810);

    @keyframes spin { to { transform: rotate(360deg); } }

    footer { position: relative; z-index: 1; }
    main.page-wrapper { position: relative; z-index: 1; min-height: 100vh; }

  <script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.170.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/" } }

  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  // ── CONFIG (defaults, overridden by Firestore) ──
  const DEFAULT_BOARDS = [
    { id:'psychology',  icon:'🧠', title:'Психология мышления',   desc:'Почему умные люди принимают плохие решения',      color:'#00d4ff', size: 1.2 },
    { id:'philosophy',  icon:'🌀', title:'Философия языка',        desc:'Слова формируют мышление или наоборот?',           color:'#a855f7', size: 1.0 },
    { id:'tech',        icon:'⚡', title:'Технологии и ИИ',         desc:'Что меняется, когда машины начинают думать',       color:'#34d399', size: 1.0 },
    { id:'sociology',   icon:'🌍', title:'Люди в разных средах',    desc:'Как место определяет мышление и поведение',        color:'#f97316', size: 0.85 },
    { id:'acrobatics',  icon:'🤸', title:'Акробатика',              desc:'10+ лет на сцене — тело как инструмент познания',  color:'#00d4ff', size: 0.85 },
  ];

  // Load config from Firestore
  async function loadWorldConfig() {
    try {
      await new Promise(r => { const check = () => { if (window.fsGet) r(); else setTimeout(check, 100); }; check(); });
      const doc = await window.fsGet('content', 'ac_world');
      if (doc) {
        if (doc.title) document.querySelector('.world-title h1').textContent = doc.title;
        if (doc.desc) document.querySelector('.world-title p').textContent = doc.desc;
        if (doc.spheres && doc.spheres.length) return doc.spheres;
      }
    } catch(e) {}
    return null;
  }

  function hexToInt(hex) { return parseInt((hex||'#00d4ff').replace('#',''), 16); }

  const isMobile = /Mobi|Android/i.test(navigator.userAgent);

  // ── SCENE SETUP ──
  const canvas = document.getElementById('world-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: !isMobile, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 12);

  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.enablePan = false;
  controls.minDistance = 5;
  controls.maxDistance = 25;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.4;

  // ── LIGHTING ──
  scene.add(new THREE.AmbientLight(0x334466, 0.6));
  const pointLight = new THREE.PointLight(0x00d4ff, 1.5, 50);
  pointLight.position.set(5, 8, 5);
  scene.add(pointLight);
  const pointLight2 = new THREE.PointLight(0xa855f7, 1.0, 40);
  pointLight2.position.set(-5, -3, -5);
  scene.add(pointLight2);

  // ── STAR TEXTURES (different types) ──
  // Spectral star colors: O(blue) B(blue-white) A(white) F(yellow-white) G(yellow) K(orange) M(red)
  const STAR_COLORS = [
    [0.7,0.8,1.0],   // blue-white
    [0.9,0.9,1.0],   // white
    [1.0,1.0,0.9],   // yellow-white
    [1.0,0.95,0.8],  // warm yellow
    [1.0,0.85,0.7],  // orange tint
    [0.6,0.75,1.0],  // blue
  ];

  function createStarTexture(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const h = size / 2;
    // Core glow
    const g = ctx.createRadialGradient(h, h, 0, h, h, h);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.05, 'rgba(255,255,255,0.9)');
    g.addColorStop(0.15, 'rgba(220,235,255,0.5)');
    g.addColorStop(0.35, 'rgba(180,210,255,0.1)');
    g.addColorStop(0.6, 'rgba(100,150,255,0.02)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, size, size);
    return new THREE.CanvasTexture(c);
  }

  function createBrightStarTexture(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const h = size / 2;
    // Core
    const g = ctx.createRadialGradient(h, h, 0, h, h, h);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.03, 'rgba(255,255,255,0.95)');
    g.addColorStop(0.1, 'rgba(200,225,255,0.5)');
    g.addColorStop(0.3, 'rgba(150,200,255,0.1)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, size, size);
    // Cross flare spikes
    ctx.globalCompositeOperation = 'lighter';
    for (let angle = 0; angle < 4; angle++) {
      ctx.save();
      ctx.translate(h, h);
      ctx.rotate(angle * Math.PI / 2 + Math.PI / 4);
      const sg = ctx.createLinearGradient(0, 0, h * 0.9, 0);
      sg.addColorStop(0, 'rgba(200,225,255,0.6)');
      sg.addColorStop(0.3, 'rgba(180,210,255,0.15)');
      sg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = sg;
      ctx.fillRect(0, -0.8, h * 0.9, 1.6);
      ctx.restore();
    }
    return new THREE.CanvasTexture(c);
  }

  const starTex = createStarTexture(64);
  const brightStarTex = createBrightStarTexture(128);

  // ── STARS (3 layers with colors + twinkle data) ──
  const twinkleStars = [];

  function makeStarLayer(count, spread, size, opacity, bright) {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      pos[i*3]   = (Math.random()-0.5) * spread;
      pos[i*3+1] = (Math.random()-0.5) * spread;
      pos[i*3+2] = (Math.random()-0.5) * spread;
      // Random spectral color
      const sc = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
      colors[i*3] = sc[0]; colors[i*3+1] = sc[1]; colors[i*3+2] = sc[2];
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const mat = new THREE.PointsMaterial({
      map: bright ? brightStarTex : starTex,
      size: size, transparent: true, opacity: opacity,
      vertexColors: true,
      sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending
    });
    const points = new THREE.Points(geo, mat);
    points.userData.baseOpacity = opacity;
    points.userData.twinkleSpeed = 0.5 + Math.random() * 1.5;
    twinkleStars.push(points);
    return points;
  }

  // Far dim stars (many, small)
  scene.add(makeStarLayer(isMobile ? 600 : 1500, 250, 0.15, 0.45, false));
  // Medium stars
  scene.add(makeStarLayer(isMobile ? 200 : 500, 150, 0.3, 0.6, false));
  // Close bright stars with flares (few)
  scene.add(makeStarLayer(isMobile ? 20 : 60, 80, 0.9, 0.85, true));

  // ── NEBULA (soft colored clouds) ──
  function createNebulaTexture(color1, color2) {
    const c = document.createElement('canvas');
    c.width = c.height = 128;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
    g.addColorStop(0, color1);
    g.addColorStop(0.3, color2);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 128, 128);
    return new THREE.CanvasTexture(c);
  }

  const nebTex1 = createNebulaTexture('rgba(0,212,255,0.12)', 'rgba(0,212,255,0.03)');
  const nebTex2 = createNebulaTexture('rgba(168,85,247,0.10)', 'rgba(168,85,247,0.02)');

  function makeNebula(count, tex, spread, size) {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      pos[i*3]   = (Math.random()-0.5) * spread;
      pos[i*3+1] = (Math.random()-0.5) * spread * 0.6;
      pos[i*3+2] = (Math.random()-0.5) * spread;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({
      map: tex, size: size, transparent: true, opacity: 1,
      sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending
    });
    return new THREE.Points(geo, mat);
  }

  scene.add(makeNebula(isMobile ? 15 : 40, nebTex1, 50, 12));
  scene.add(makeNebula(isMobile ? 15 : 40, nebTex2, 55, 14));

  // ── SPHERES ──
  const spheres = [];
  const sphereGroup = new THREE.Group();
  scene.add(sphereGroup);

  const positions = [
    [0, 1.5, 0],
    [-3.5, -0.5, -2],
    [3.5, 0, -1.5],
    [-2, 2.5, 2.5],
    [2.5, -1.5, 3],
  ];

  let BOARDS = DEFAULT_BOARDS;

  function buildSpheres(data) {
    BOARDS = data || DEFAULT_BOARDS;
    BOARDS.forEach((board, i) => {
      if (i >= positions.length) return;
      const sz = board.size || 1.0;
      const col = hexToInt(board.color);
      const geo = new THREE.SphereGeometry(sz, 48, 32);
      const mat = new THREE.MeshPhysicalMaterial({
        color: col,
        emissive: col,
      emissiveIntensity: 0.2,
      metalness: 0.15,
      roughness: 0.25,
      transparent: true,
      opacity: 0.88,
      clearcoat: 0.4,
      clearcoatRoughness: 0.2,
      envMapIntensity: 0.5,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(...positions[i]);
    mesh.userData = { board, index: i, baseY: positions[i][1] };
    sphereGroup.add(mesh);
    spheres.push(mesh);

    // Glow ring
    const ringGeo = new THREE.RingGeometry(sz + 0.1, sz + 0.22, 64);
    const ringMat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(mesh.position);
    ring.lookAt(camera.position);
    ring.userData.parentSphere = mesh;
    sphereGroup.add(ring);
  });
  }

  // ── CONNECTION LINES ──
  const lineMat = new THREE.LineBasicMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.08 });
  for (let i = 0; i < spheres.length; i++) {
    for (let j = i + 1; j < spheres.length; j++) {
      const geo = new THREE.BufferGeometry().setFromPoints([spheres[i].position, spheres[j].position]);
      const line = new THREE.Line(geo, lineMat.clone());
      line.userData = { i, j };
      sphereGroup.add(line);
    }
  }

  // ── RAYCASTER (hover + click) ──
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2(-999, -999);
  let hoveredSphere = null;
  const label = document.getElementById('sphere-label');

  canvas.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  });

  canvas.addEventListener('click', () => {
    if (hoveredSphere) {
      const board = hoveredSphere.userData.board;
      window.location.href = 'interest.html?id=' + board.id;
    }
  });

  canvas.addEventListener('touchend', (e) => {
    if (hoveredSphere) {
      const board = hoveredSphere.userData.board;
      window.location.href = 'interest.html?id=' + board.id;
    }
  });

  function updateHover() {
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(spheres);

    if (hits.length > 0) {
      const mesh = hits[0].object;
      if (hoveredSphere !== mesh) {
        // Reset previous
        if (hoveredSphere) {
          hoveredSphere.material.emissiveIntensity = 0.15;
          hoveredSphere.scale.setScalar(1);
        }
        hoveredSphere = mesh;
        mesh.material.emissiveIntensity = 0.5;
        mesh.scale.setScalar(1.15);
        canvas.style.cursor = 'pointer';

        // Update label
        const b = mesh.userData.board;
        document.getElementById('sl-icon').textContent = b.icon;
        document.getElementById('sl-title').textContent = b.title;
        document.getElementById('sl-desc').textContent = b.desc;
        document.getElementById('sl-count').textContent = 'Нажми чтобы открыть →';
        label.classList.add('visible');
      }

      // Position label near cursor
      const vec = mesh.position.clone().project(camera);
      const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-vec.y * 0.5 + 0.5) * window.innerHeight;
      label.style.left = Math.min(x + 20, window.innerWidth - 280) + 'px';
      label.style.top = Math.min(y - 20, window.innerHeight - 120) + 'px';

    } else {
      if (hoveredSphere) {
        hoveredSphere.material.emissiveIntensity = 0.15;
        hoveredSphere.scale.setScalar(1);
        hoveredSphere = null;
        canvas.style.cursor = 'grab';
        label.classList.remove('visible');
      }
    }
  }

  // ── ANIMATION LOOP ──
  let time = 0;
  let isVisible = true;
  document.addEventListener('visibilitychange', () => { isVisible = !document.hidden; if (isVisible) animate(); });

  function animate() {
    if (!isVisible) return;
    requestAnimationFrame(animate);
    time += 0.01;

    // Twinkle stars
    twinkleStars.forEach((s, i) => {
      s.material.opacity = s.userData.baseOpacity + Math.sin(time * s.userData.twinkleSpeed + i * 2.7) * 0.12;
    });

    // Float spheres
    spheres.forEach((s, i) => {
      s.position.y = s.userData.baseY + Math.sin(time * 0.8 + i * 1.3) * 0.3;
      s.rotation.x += 0.002;
      s.rotation.y += 0.003;
    });

    // Pulse connection lines
    sphereGroup.children.forEach(child => {
      if (child.isLine && child.material) {
        child.material.opacity = 0.05 + Math.sin(time * 2 + (child.userData.i || 0)) * 0.04;
      }
    });

    // Update rings to face camera
    sphereGroup.children.forEach(child => {
      if (child.userData && child.userData.parentSphere) {
        child.position.copy(child.userData.parentSphere.position);
        child.lookAt(camera.position);
      }
    });

    controls.update();
    updateHover();
    renderer.render(scene, camera);
  }

  // ── RESIZE ──
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }, { passive: true });

  // ── LOAD BOARD COUNTS FROM FIRESTORE ──
  async function loadBoardData() {
    try {
      await new Promise(r => { const check = () => { if (window.fsGet) r(); else setTimeout(check, 100); }; check(); });
      for (const board of BOARDS) {
        try {
          const doc = await window.fsGet('boards', board.id);
          if (doc && doc.posts) {
            const count = doc.posts.filter(p => p.published !== false).length;
            board.postCount = count;
            // Update sphere size based on post count
            const idx = BOARDS.indexOf(board);
            if (idx >= 0 && spheres[idx]) {
              const newSize = Math.max(0.7, Math.min(1.8, 0.7 + count * 0.1));
              spheres[idx].scale.setScalar(newSize / (board.size || 1));
            }
          }
        } catch(e) {}
      }
    } catch(e) {}
  }

  // ── START ──
  // Build with defaults first, then override from Firestore
  buildSpheres(DEFAULT_BOARDS);
  animate();

  loadWorldConfig().then((firestoreSpheres) => {
    if (firestoreSpheres && firestoreSpheres.length) {
      // Rebuild spheres with Firestore data
      // Clear existing
      while(sphereGroup.children.length) sphereGroup.remove(sphereGroup.children[0]);
      spheres.length = 0;
      buildSpheres(firestoreSpheres);
      // Rebuild connection lines
      const lineMat2 = new THREE.LineBasicMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.08 });
      for (let i = 0; i < spheres.length; i++) {
        for (let j = i + 1; j < spheres.length; j++) {
          const geo = new THREE.BufferGeometry().setFromPoints([spheres[i].position, spheres[j].position]);
          const line = new THREE.Line(geo, lineMat2.clone());
          line.userData = { i, j };
          sphereGroup.add(line);
        }
      }
    }
    return loadBoardData();
  }).then(() => {
    setTimeout(() => { document.getElementById('world-loading').classList.add('done'); }, 500);
  });

  // Remove loading after timeout anyway
  setTimeout(() => { document.getElementById('world-loading').classList.add('done'); }, 3000);
  </script>
</body>
</html>
