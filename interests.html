  <style>
    #interests-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:18px; margin-bottom:80px; }
    .interest-card { display:block; border-radius:var(--radius); padding:32px 28px; transition:transform var(--transition),box-shadow var(--transition),border-color var(--transition); text-decoration:none; color:inherit; border:1px solid transparent; }
    a.interest-card { cursor:pointer; }
    a.interest-card:hover { transform:translateY(-4px); box-shadow:0 12px 40px rgba(0,0,0,0.3); border-color:rgba(0,212,255,0.2); }
    .interest-icon { font-size:2.2rem; margin-bottom:16px; filter:drop-shadow(0 0 10px rgba(0,212,255,0.4)); display:flex; align-items:center; }
    .interest-icon svg { width:36px; height:36px; stroke:var(--accent); stroke-width:1.75; fill:none; }
    .interest-title { font-size:1rem; font-weight:700; margin-bottom:10px; letter-spacing:.04em; text-transform:uppercase; }
    .interest-desc { font-size:.9rem; color:var(--muted); line-height:1.65; }
    .interest-questions { margin-top:16px; display:flex; flex-direction:column; gap:7px; }
    .interest-questions span { font-size:.8rem; color:var(--accent); font-style:italic; }
    .interest-questions span::before { content:'→ '; }
    .interest-open-link { margin-top:20px; font-size:.82rem; font-weight:700; color:var(--accent); letter-spacing:.06em; opacity:0; transform:translateX(-6px); transition:opacity var(--transition),transform var(--transition); }
    a.interest-card:hover .interest-open-link { opacity:1; transform:translateX(0); }
    @media(max-width:768px){ #interests-grid{grid-template-columns:1fr;} }
  </style>
