<head>

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Контакт · Andrii Chepelovskyi" />
  <meta property="og:description" content="Связаться с Андрием — контакты и способы связи." />
  <meta property="og:image" content="og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#00d4ff" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:64px; align-items:start; margin-bottom:80px; }
    #contact-items { display:flex; flex-direction:column; gap:12px; }
    .contact-card { display:flex; align-items:center; gap:18px; border-radius:var(--radius); padding:20px 24px; text-decoration:none; color:var(--text); transition:transform var(--transition); }
    .contact-card:hover { transform:translateX(8px); }
    .contact-card .icon { font-size:1.6rem; flex-shrink:0; width:44px; text-align:center; filter:drop-shadow(0 0 6px rgba(0,212,255,0.4)); display:flex; align-items:center; justify-content:center; }
    .contact-card .icon svg { width:26px; height:26px; stroke:var(--accent); stroke-width:1.75; fill:none; }
    .contact-card .info .label { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.12em; margin-bottom:2px; }
    .contact-card .info .value { font-size:.95rem; font-weight:600; }
    .contact-card .arrow { margin-left:auto; color:var(--accent); font-size:1.1rem; opacity:0; transition:opacity var(--transition),transform var(--transition); text-shadow:0 0 8px var(--accent); }
    .contact-card:hover .arrow { opacity:1; transform:translateX(4px); }
    .contact-text h3 { font-size:1rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin-bottom:18px; text-shadow:0 0 10px rgba(0,212,255,0.4); }
    #contact-text-paras p { color:var(--muted); font-size:.96rem; margin-bottom:14px; line-height:1.75; }
    #contact-text-paras p b { color:var(--text); }
    .topics-wrap { margin-top:28px; }
    .topics-wrap h4 { font-size:.7rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
    #contact-topics { display:flex; flex-wrap:wrap; gap:8px; }
    .topic-tag { display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:6px 14px; font-size:.82rem; }
    @media(max-width:768px){ .contact-grid{grid-template-columns:1fr;gap:40px;} }

    /* ── Contact Form ─────────────────────────────────────── */
    .contact-form-section { padding-top:56px; border-top:1px solid rgba(255,255,255,.06); margin-bottom:80px; }
    .cform-heading {
      font-size:.7rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
      color:var(--accent); margin-bottom:32px;
      text-shadow:0 0 10px rgba(0,212,255,.35);
    }
    .cform-heading::before { content:'// '; opacity:.55; }

    .cform { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .cform-full { grid-column:1/-1; }
    .cform-field label {
      display:block; font-size:.68rem; font-weight:700;
      letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:8px;
    }
    .cform-field input,
    .cform-field textarea {
      width:100%; background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.09); border-radius:var(--radius);
      padding:14px 16px; color:var(--text); font-size:.93rem;
      font-family:inherit; transition:border-color .2s,box-shadow .2s;
      resize:none; outline:none; box-sizing:border-box;
    }
    .cform-field input:focus,
    .cform-field textarea:focus {
      border-color:rgba(0,212,255,.45); box-shadow:0 0 0 3px rgba(0,212,255,.08);
    }
    .cform-field input::placeholder,
    .cform-field textarea::placeholder { color:rgba(241,245,249,.22); }
    .cform-field textarea { min-height:140px; }
    .cform-submit { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .cform-btn {
      display:inline-flex; align-items:center; gap:8px;
      background:var(--accent); color:#050810; border:none;
      border-radius:var(--radius); padding:13px 28px;
      font-size:.88rem; font-weight:700; letter-spacing:.08em;
      text-transform:uppercase; cursor:pointer;
      transition:opacity .2s,transform .2s;
      box-shadow:0 0 18px rgba(0,212,255,.28);
    }
    .cform-btn:hover:not(:disabled) { opacity:.85; transform:translateY(-1px); }
    .cform-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
    .cform-status { font-size:.88rem; }
    .cform-status.ok  { color:#4ade80; }
    .cform-status.err { color:#f87171; }
    @media(max-width:640px){ .cform { grid-template-columns:1fr; } }
  </style>
</head>
<body data-page="contact">
  <noscript><style>.fade-in{opacity:1!important;transform:none!important}#page-overlay{display:none!important}</style></noscript>
  <div id="page-overlay"></div>
  <nav>
    <a href="index.html" class="nav-logo">A<span>.</span>C</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="about.html"     onclick="closeMenu()" data-i18n="nav_about">О себе</a></li>
      <li><a href="journey.html"   onclick="closeMenu()" data-i18n="nav_journey">Мой путь</a></li>
      <li><a href="interests.html" onclick="closeMenu()" data-i18n="nav_interests">Интересы</a></li>
      <li><a href="videos.html"    onclick="closeMenu()" data-i18n="nav_videos">Видео</a></li>
      <li><a href="contact.html"   onclick="closeMenu()" data-i18n="nav_contact">Контакт</a></li>
    </ul>
    <div class="nav-controls">
      <div class="lang-btns">
        <button class="lang-btn" data-lang="ru" onclick="switchLang('ru')">RU</button>
        <button class="lang-btn" data-lang="uk" onclick="switchLang('uk')">UK</button>
        <button class="lang-btn" data-lang="no" onclick="switchLang('no')">NO</button>
      </div>
      <div class="nav-sep"></div>
      <div class="theme-dots">
        <button class="theme-dot t-cyan"   data-theme="cyan"   onclick="switchTheme('cyan')"   title="Cyan"></button>
        <button class="theme-dot t-purple" data-theme="purple" onclick="switchTheme('purple')" title="Purple"></button>
        <button class="theme-dot t-green"  data-theme="green"  onclick="switchTheme('green')"  title="Green"></button>
        <button class="theme-dot t-orange" data-theme="orange" onclick="switchTheme('orange')" title="Orange"></button>
      </div>
    </div>
    <button class="burger" id="burger" onclick="toggleMenu()" aria-label="Меню">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="page-wrapper">
    <div class="container">
      <div class="page-hero fade-in">
        <a href="index.html" class="back-link" data-i18n="back_home">← На главную</a>
        <p class="section-label" id="contact-section-label" data-i18n="lbl_contact">Контакт</p>
        <h1 class="section-title" id="contact-page-title"></h1>
        <p class="section-desc" id="contact-page-desc"></p>
      </div>
      <div class="contact-grid">
        <div id="contact-items" class="fade-in"></div>
        <div class="contact-text fade-in">
          <h3 id="contact-text-title"></h3>
          <div id="contact-text-paras"></div>
          <div class="topics-wrap">
            <h4 data-i18n="topics_title">// Темы</h4>
            <div id="contact-topics"></div>
          </div>
        </div>
      </div>

      <!-- Web3Forms contact form — shown by loader.js when web3formsKey is configured -->
      <div id="contact-form-wrap" style="display:none">
        <div class="contact-form-section fade-in">
          <div class="cform-heading" id="cform-heading">Написать напрямую</div>
          <form class="cform" id="cform" action="https://api.web3forms.com/submit" onsubmit="submitCForm(event)">
            <!-- Web3Forms hidden fields -->
            <input type="hidden" name="access_key" id="cf-access-key" value="" />
            <input type="hidden" name="subject" value="Новое сообщение с сайта" />
            <input type="hidden" name="from_name" value="Andrii Chepelovskyi Site" />
            <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off" />
            <!-- Name -->
            <div class="cform-field">
              <label for="cf-name">Ваше имя</label>
              <input id="cf-name" name="name" type="text" required placeholder="Андрий" autocomplete="name" />
            </div>
            <!-- Email -->
            <div class="cform-field">
              <label for="cf-email">Email</label>
              <input id="cf-email" name="email" type="email" required placeholder="you@example.com" autocomplete="email" />
            </div>
            <!-- Message -->
            <div class="cform-field cform-full">
              <label for="cf-msg">Сообщение</label>
              <textarea id="cf-msg" name="message" required placeholder="Привет, хотел спросить…"></textarea>
            </div>
            <!-- Submit row -->
            <div class="cform-submit cform-full">
              <button type="submit" class="cform-btn" id="cform-btn">
                <span id="cform-btn-lbl">Отправить →</span>
              </button>
              <span class="cform-status" id="cform-status"></span>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>

  <footer></footer>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="site-data.js"></script>
  <script src="translations.js"></script>
  <script src="loader.js"></script>
  <script src="nav.js"></script>
  <script src="effects.js"></script>
  <script>
  function submitCForm(e) {
    e.preventDefault();
    const form = document.getElementById('cform');
    const btn  = document.getElementById('cform-btn');
    const lbl  = document.getElementById('cform-btn-lbl');
    const stat = document.getElementById('cform-status');
    btn.disabled = true;
    lbl.textContent = '⏳ Отправка…';
    stat.textContent = '';
    stat.className = 'cform-status';
    fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      body: new FormData(form),
      headers: { Accept: 'application/json' }
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        form.reset();
        // restore access_key after reset
        const k = document.getElementById('cf-access-key');
        if (k) k.value = k.dataset.key || '';
        stat.textContent = '✓ Отправлено! Отвечу в ближайшее время.';
        stat.className = 'cform-status ok';
        lbl.textContent = 'Отправить →';
      } else {
        throw new Error(data.message || 'server_error');
      }
    })
    .catch(() => {
      stat.textContent = '✕ Что-то пошло не так — попробуй ещё раз.';
      stat.className = 'cform-status err';
      lbl.textContent = 'Отправить →';
    })
    .finally(() => { btn.disabled = false; });
  }
  </script>
</body>
</html>
