        <h1 class="page-title fade-in">Написать</h1>

      <p class="contact-intro fade-in delay-1">Если хочешь написать — просто напиши.</p>

      <form class="form" data-contact-form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="dda0c183-2be1-49d6-9b03-7c7a7cbabe41" />
        <input type="hidden" name="subject" value="Новое сообщение с chepelovskyi.com" />
        <input type="hidden" name="from_name" value="chepelovskyi.com" />
        <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off" />

        <div class="form-row">
          <label class="form-label" for="c-name">Имя</label>
          <input class="form-input" type="text" id="c-name" name="name" required autocomplete="name" />
        </div>

        <div class="form-row">
          <label class="form-label" for="c-email">Электронная почта</label>
          <input class="form-input" type="email" id="c-email" name="email" required autocomplete="email" />
        </div>

        <div class="form-row">
          <label class="form-label" for="c-message">Сообщение</label>
          <textarea class="form-textarea" id="c-message" name="message" required></textarea>
        </div>

        <button class="btn form-submit" type="submit">Отправить</button>

        <div class="form-status" role="status" aria-live="polite"></div>
      </form>

      <div class="contact-foot">
        Или посмотри <a href="/youtube.html">YouTube канал</a> — стихи вслух.
